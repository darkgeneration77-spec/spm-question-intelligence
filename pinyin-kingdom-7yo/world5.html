<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼音王国 World 5：鼻音洞穴</title>
  <style>
    :root{--ink:#24324a;--blue:#4c6ef5;--purple:#845ef7;--green:#2f9e44;--red:#e03131;--gold:#f59f00}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Arial Rounded MT Bold","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);background:linear-gradient(180deg,#e5dbff,#d0ebff,#fff4cc)}button{font:inherit}.app{max-width:980px;margin:auto;padding:16px}.hero,.panel{background:rgba(255,255,255,.95);border-radius:28px;padding:18px;box-shadow:0 12px 30px rgba(36,50,74,.12)}.hero{text-align:center}.hero h1{margin:0;font-size:clamp(30px,7vw,54px)}.hero p{margin:8px 0 0;font-size:18px}.panel{margin-top:14px}.hidden{display:none!important}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.pill{background:#edf2ff;color:#364fc7;padding:8px 12px;border-radius:999px}.progress{height:16px;background:#e9ecef;border-radius:999px;overflow:hidden;margin:14px 0}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));width:0;transition:.3s}.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.lesson{background:#f8f9fa;border-radius:20px;padding:14px}.lesson h3{margin:0 0 8px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:white;border:2px solid #e9ecef;border-radius:999px;padding:8px 12px}.battle{display:grid;grid-template-columns:1fr 1.3fr;gap:14px}.fighter,.boss{border-radius:24px;padding:14px;text-align:center}.fighter{background:#f8f9fa}.boss{background:#f3f0ff}.face{font-size:68px}.hp{height:14px;background:#dee2e6;border-radius:999px;overflow:hidden;margin-top:8px}.hp span{display:block;height:100%;transition:.3s}.fighter .hp span{background:var(--green)}.boss .hp span{background:var(--red)}.question{text-align:center;font-size:clamp(28px,6vw,46px);padding:18px 8px}.hint{text-align:center;color:#667085;margin-bottom:12px}.answers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.answer{min-height:84px;border:3px solid #e9ecef;background:#fff;border-radius:22px;font-size:28px;cursor:pointer;transition:.15s}.answer:hover{transform:scale(1.02);border-color:var(--purple)}.answer.correct{background:#d3f9d8;border-color:var(--green)}.answer.wrong{background:#ffe3e3;border-color:var(--red)}.combo{text-align:center;font-size:24px;color:var(--gold);min-height:34px}.message{text-align:center;min-height:44px;background:#f8f9fa;border-radius:18px;padding:12px;margin-top:12px}.skills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}.skill{border:2px solid #e9ecef;background:white;border-radius:16px;padding:9px 13px;cursor:pointer}.skill:disabled{opacity:.45}.primary,.secondary{border:0;border-radius:18px;padding:14px 18px;cursor:pointer}.primary{background:var(--blue);color:white}.secondary{background:#f1f3f5;color:var(--ink)}.reward{text-align:center}.reward .big{font-size:86px}.stars{font-size:28px;letter-spacing:4px}.shake{animation:shake .35s}@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}@media(max-width:680px){.battle,.answers,.lesson-grid{grid-template-columns:1fr}.face{font-size:58px}}
  </style>
</head>
<body>
<main class="app">
  <section class="hero"><h1>🦇 鼻音洞穴</h1><p>分清前鼻音和后鼻音，打败回声巨蟒！</p></section>

  <section id="lessonPanel" class="panel">
    <div class="top"><button class="secondary" id="lessonBack" type="button">← 返回拼音王国</button><span class="pill">World 5 学习</span></div>
    <div class="lesson-grid" style="margin-top:14px">
      <div class="lesson"><h3>前鼻音：n 收尾</h3><div class="chips"><span class="chip">an</span><span class="chip">en</span><span class="chip">ian</span><span class="chip">in</span><span class="chip">uan</span><span class="chip">uen</span><span class="chip">ün</span></div><p>口诀：看到最后一个字母是 n，就是前鼻音。</p></div>
      <div class="lesson"><h3>后鼻音：ng 收尾</h3><div class="chips"><span class="chip">ang</span><span class="chip">eng</span><span class="chip">ong</span><span class="chip">iang</span><span class="chip">ing</span><span class="chip">iong</span><span class="chip">uang</span><span class="chip">ueng</span></div><p>口诀：最后有 ng，声音往后送。</p></div>
    </div>
    <div class="lesson" style="margin-top:12px"><h3>最容易混淆</h3><div class="chips"><span class="chip">an ↔ ang</span><span class="chip">en ↔ eng</span><span class="chip">in ↔ ing</span><span class="chip">ian ↔ iang</span><span class="chip">uan ↔ uang</span></div></div>
    <button id="startBtn" class="primary" type="button" style="width:100%;margin-top:14px">开始挑战</button>
  </section>

  <section id="gamePanel" class="panel hidden">
    <div class="top"><button id="backBtn" class="secondary" type="button">← 返回学习</button><span class="pill" id="round">第 1 / 30 题</span><span class="pill">⭐ <span id="score">0</span></span></div>
    <div class="progress"><span id="progress"></span></div>
    <div class="battle"><div id="fighter" class="fighter"><div class="face">🐰</div><strong>小兔勇士</strong><div class="hp"><span id="playerHp" style="width:100%"></span></div><div id="playerHpText">100 HP</div></div><div id="boss" class="boss"><div class="face">🐍</div><strong>回声巨蟒</strong><div class="hp"><span id="bossHp" style="width:100%"></span></div><div id="bossHpText">3000 HP</div></div></div>
    <div id="combo" class="combo"></div><div id="question" class="question">准备开始</div><div id="hint" class="hint">选出正确答案。</div><div id="answers" class="answers"></div>
    <div class="skills"><button id="hintSkill" class="skill" type="button">💡 提示 × 3</button><button id="shieldSkill" class="skill" type="button">🛡️ 护盾 × 1</button></div><div id="message" class="message">开始挑战吧！</div>
  </section>

  <section id="rewardPanel" class="panel reward hidden"><div class="big">🏆</div><h2>回声巨蟒被打败了！</h2><div id="stars" class="stars">⭐⭐⭐</div><p id="summary"></p><button id="againBtn" class="primary" type="button">再玩一次</button><button id="homeBtn" class="secondary" type="button">回到拼音王国</button></section>
</main>
<script>
const questions=[
{q:'哪一个是前鼻音？',a:'an',c:['an','ang','ao','ai'],tip:'前鼻音以 n 收尾。'},
{q:'哪一个是后鼻音？',a:'ang',c:['an','ang','ai','ao'],tip:'后鼻音以 ng 收尾。'},
{q:'en 属于哪一类？',a:'前鼻音',c:['前鼻音','后鼻音','复韵母','特别韵母'],tip:'en 最后是 n。'},
{q:'eng 属于哪一类？',a:'后鼻音',c:['前鼻音','后鼻音','单韵母','特别韵母'],tip:'eng 最后是 ng。'},
{q:'in 属于哪一类？',a:'前鼻音',c:['前鼻音','后鼻音','声母','单韵母'],tip:'in 以 n 收尾。'},
{q:'ing 属于哪一类？',a:'后鼻音',c:['前鼻音','后鼻音','声母','单韵母'],tip:'ing 以 ng 收尾。'},
{q:'ian 属于哪一类？',a:'前鼻音',c:['前鼻音','后鼻音','声母','儿化韵'],tip:'ian 最后是 n。'},
{q:'iang 属于哪一类？',a:'后鼻音',c:['前鼻音','后鼻音','声母','儿化韵'],tip:'iang 最后是 ng。'},
{q:'uan 属于哪一类？',a:'前鼻音',c:['前鼻音','后鼻音','声母','轻声'],tip:'uan 最后是 n。'},
{q:'uang 属于哪一类？',a:'后鼻音',c:['前鼻音','后鼻音','声母','轻声'],tip:'uang 最后是 ng。'},
{q:'“安” 的韵母是？',a:'an',c:['an','ang','en','eng'],tip:'安 ān，韵母是 an。'},
{q:'“昂” 的韵母是？',a:'ang',c:['an','ang','en','eng'],tip:'昂 áng，韵母是 ang。'},
{q:'“恩” 的韵母是？',a:'en',c:['en','eng','in','ing'],tip:'恩 ēn，韵母是 en。'},
{q:'“冷”里的韵母更接近哪一个？',a:'eng',c:['en','eng','an','ang'],tip:'冷 lěng，韵母是 eng。'},
{q:'“因” 的韵母是？',a:'in',c:['in','ing','ian','iang'],tip:'因 yīn，韵母是 in。'},
{q:'“英” 的韵母是？',a:'ing',c:['in','ing','ian','iang'],tip:'英 yīng，韵母是 ing。'},
{q:'“颜” 的韵母是？',a:'ian',c:['ian','iang','in','ing'],tip:'颜 yán，韵母是 ian。'},
{q:'“央” 的韵母是？',a:'iang',c:['ian','iang','in','ing'],tip:'央 yāng，韵母是 iang。'},
{q:'“弯” 的韵母是？',a:'uan',c:['uan','uang','uen','ueng'],tip:'弯 wān，韵母是 uan。'},
{q:'“汪” 的韵母是？',a:'uang',c:['uan','uang','uen','ueng'],tip:'汪 wāng，韵母是 uang。'},
{q:'“温” 的韵母是？',a:'uen',c:['uen','ueng','uan','uang'],tip:'温 wēn，课本列作 uen。'},
{q:'“翁” 的韵母是？',a:'ueng',c:['uen','ueng','uan','uang'],tip:'翁 wēng，韵母是 ueng。'},
{q:'“晕” 的韵母是？',a:'ün',c:['ün','in','ing','iong'],tip:'晕 yūn，韵母是 ün。'},
{q:'“轰” 的韵母是？',a:'ong',c:['ong','iong','eng','ang'],tip:'轰 hōng，韵母是 ong。'},
{q:'“佣” 的韵母是？',a:'iong',c:['ong','iong','ing','iang'],tip:'佣 yōng，韵母是 iong。'},
{q:'前鼻音最后一个字母是什么？',a:'n',c:['n','ng','m','r'],tip:'前鼻音以 n 收尾。'},
{q:'后鼻音最后两个字母是什么？',a:'ng',c:['n','ng','er','ai'],tip:'后鼻音以 ng 收尾。'},
{q:'哪一组全部是前鼻音？',a:'an、en、in',c:['an、en、in','ang、eng、ing','ai、ei、ao','zh、ch、sh'],tip:'an、en、in 都以 n 收尾。'},
{q:'哪一组全部是后鼻音？',a:'ang、eng、ing',c:['an、en、in','ang、eng、ing','ai、ei、ao','b、p、m'],tip:'ang、eng、ing 都以 ng 收尾。'},
{q:'判断前后鼻音最简单的方法是？',a:'看结尾是 n 还是 ng',c:['看声调','看开头声母','看结尾是 n 还是 ng','看字有几画'],tip:'n 是前鼻音，ng 是后鼻音。'}
];
const $=id=>document.getElementById(id);let order=[],index=0,score=0,combo=0,player=100,boss=3000,locked=false,hints=3,shield=1,shieldOn=false,correct=0;
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function start(){order=shuffle(questions);index=0;score=0;combo=0;player=100;boss=3000;locked=false;hints=3;shield=1;shieldOn=false;correct=0;$('lessonPanel').classList.add('hidden');$('rewardPanel').classList.add('hidden');$('gamePanel').classList.remove('hidden');update();render()}
function render(){locked=false;const item=order[index];$('round').textContent=`第 ${index+1} / ${order.length} 题`;$('progress').style.width=`${index/order.length*100}%`;$('question').textContent=item.q;$('hint').textContent='看结尾：n 还是 ng？';$('answers').innerHTML='';shuffle(item.c).forEach(choice=>{const b=document.createElement('button');b.type='button';b.className='answer';b.textContent=choice;b.addEventListener('click',()=>answer(b,choice,item));$('answers').appendChild(b)});$('message').textContent='看清楚，再点击。';updateSkills()}
function answer(btn,choice,item){if(locked)return;locked=true;const buttons=[...document.querySelectorAll('.answer')];if(choice===item.a){btn.classList.add('correct');combo++;correct++;let damage=90+Math.min(combo,6)*15;score+=damage;boss=Math.max(0,boss-damage);$('boss').classList.add('shake');setTimeout(()=>$('boss').classList.remove('shake'),350);$('message').textContent=`答对了！${item.tip}`}else{btn.classList.add('wrong');combo=0;const right=buttons.find(x=>x.textContent===item.a);if(right)right.classList.add('correct');if(shieldOn){shieldOn=false;$('message').textContent=`护盾挡住攻击！正确答案是“${item.a}”。${item.tip}`}else{player=Math.max(0,player-10);$('fighter').classList.add('shake');setTimeout(()=>$('fighter').classList.remove('shake'),350);$('message').textContent=`差一点。正确答案是“${item.a}”。${item.tip}`}}buttons.forEach(x=>x.disabled=true);update();setTimeout(()=>{index++;if(index>=order.length||boss<=0)finish();else render()},1500)}
function update(){$('score').textContent=score;$('playerHp').style.width=player+'%';$('playerHpText').textContent=player+' HP';$('bossHp').style.width=(boss/3000*100)+'%';$('bossHpText').textContent=boss+' HP';$('combo').textContent=combo>=10?'🔥 LEGEND ×'+combo:combo>=5?'⚡ ULTRA ×'+combo:combo>=2?'🔥 COMBO ×'+combo:'';updateSkills()}
function updateSkills(){$('hintSkill').textContent='💡 提示 × '+hints;$('shieldSkill').textContent=shieldOn?'🛡️ 护盾已开启':'🛡️ 护盾 × '+shield;$('hintSkill').disabled=hints<=0||locked;$('shieldSkill').disabled=shield<=0||shieldOn||locked}
function finish(){$('gamePanel').classList.add('hidden');$('rewardPanel').classList.remove('hidden');const rate=Math.round(correct/order.length*100);$('stars').textContent=rate>=90?'⭐⭐⭐':rate>=70?'⭐⭐':'⭐';$('summary').textContent=`答对 ${correct} / ${order.length} 题，正确率 ${rate}%，获得 ${score} 分。`;localStorage.setItem('pinyinWorld5','complete')}
$('hintSkill').addEventListener('click',()=>{if(hints<=0||locked)return;hints--;const item=order[index];const wrong=[...document.querySelectorAll('.answer')].filter(b=>b.textContent!==item.a);shuffle(wrong).slice(0,2).forEach(b=>{b.disabled=true;b.style.opacity='.28'});$('hint').textContent='已经帮你排除两个错误答案。';updateSkills()});
$('shieldSkill').addEventListener('click',()=>{if(shield<=0||shieldOn||locked)return;shield--;shieldOn=true;$('message').textContent='护盾开启！下一次答错不会扣血。';updateSkills()});
$('startBtn').addEventListener('click',start);$('againBtn').addEventListener('click',start);$('backBtn').addEventListener('click',()=>{$('gamePanel').classList.add('hidden');$('lessonPanel').classList.remove('hidden')});$('lessonBack').addEventListener('click',()=>location.href='index.html');$('homeBtn').addEventListener('click',()=>location.href='index.html');
</script>
</body>
</html>
