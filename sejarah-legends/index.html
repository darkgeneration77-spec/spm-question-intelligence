<!doctype html>
<html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title>
<style>
:root{--bg:#07111f;--panel:#10213a;--panel2:#132945;--line:#31547c;--gold:#f3c65d;--text:#eef4ff;--green:#2b936c;--red:#a43d50}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#17345b,#07111f 48%);color:var(--text);min-height:100vh}.app{max-width:1100px;margin:auto;padding:16px}.card{background:rgba(16,33,58,.96);border:1px solid #29496f;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 14px 38px #0005}button,input{padding:13px 16px;border:0;border-radius:12px;font-weight:800}button{background:var(--gold);cursor:pointer;transition:.18s}button:hover{transform:translateY(-2px);filter:brightness(1.08)}button:disabled{opacity:.35;cursor:not-allowed;transform:none}input{background:#09192c;color:#fff;border:1px solid #31547c;width:100%;margin:8px 0}.top,.toolbar,.battle{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.top{justify-content:space-between}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#0b1a2e;border:1px solid #31547c;border-radius:999px;padding:8px 12px;font-weight:700}.hide{display:none!important}.worlds,.characters,.essayGrid,.badgeGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.world,.character,.essayCard,.badge{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:17px}.world.open,.character.selected,.essayCard.selected{border-color:var(--gold);box-shadow:0 0 20px #f3c65d33}.locked{opacity:.4}.avatar{font-size:52px;text-align:center}.arena{position:relative;min-height:230px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:end;overflow:hidden;background:linear-gradient(#1a3151,#0b1728);border-radius:18px;padding:25px}.fighter{text-align:center}.sprite{font-size:78px;display:block;filter:drop-shadow(0 10px 8px #0008)}.enemySprite{animation:float 2s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}.attack{animation:attack .45s}@keyframes attack{50%{transform:translateX(65px) scale(1.12)}}.hit{animation:hit .45s}@keyframes hit{25%{transform:translateX(-12px);filter:brightness(2)}50%{transform:translateX(12px)}}.taunt{position:absolute;top:12px;right:18px;background:#7a2f3e;padding:9px 13px;border-radius:14px;max-width:50%;font-weight:700}.bar{height:15px;background:#07111f;border-radius:20px;overflow:hidden;border:1px solid #29496f}.bar span{display:block;height:100%;background:linear-gradient(90deg,#e44d68,#ff8c62);transition:.45s}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer,.builderOption{text-align:left;background:#17304f;color:#fff;border:1px solid #3c638d}.answer.ok{background:var(--green)}.answer.bad{background:var(--red)}.feedback{line-height:1.65}.correctBox{border-left:5px solid var(--green)}.wrongBox{border-left:5px solid var(--red)}.secondary{background:#25496f;color:#fff}.hint{background:#6b59bb;color:#fff}.progress{font-size:13px;color:#aecaee}.reviewItem{background:#0b1a2e;border:1px solid #29496f;border-radius:14px;padding:14px;margin:10px 0}.builderOption{display:block;width:100%;margin:8px 0}.builderSlot{min-height:50px;border:2px dashed #50759e;border-radius:12px;padding:12px;margin:9px 0}.scoreBig{font-size:52px;font-weight:900;color:var(--gold)}.timerLow{background:#7a2f3e!important}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #29496f;text-align:left;white-space:nowrap}.badge strong{color:var(--gold)}@media(max-width:680px){.answers{grid-template-columns:1fr}.arena{min-height:190px;padding:15px}.sprite{font-size:58px}.taunt{font-size:12px}.app{padding:9px}.card{padding:15px}}
</style></head><body><main class="app">
<section class="card top"><div><small>KSSM FORM 4 + FORM 5</small><h1 style="margin:.25rem 0">SEJARAH LEGENDS</h1><div class="progress">Battle RPG • 华语订正 • Paper 2 Builder</div></div><div class="stats"><span class="pill">玩家 <b id="playerTop">-</b></span><span class="pill">分数 <b id="scoreTop">0</b></span><span class="pill">Combo <b id="comboTop">0</b></span><span class="pill">Hints <b id="hintTop">3</b></span><span id="timerPill" class="pill">时间 <b id="timerTop">20</b>s</span></div></section>
<section id="home"><div class="card"><h2>建立学生档案</h2><input id="studentName" placeholder="输入学生名字"><h3>选择角色</h3><div class="characters" id="characters"></div><div class="toolbar"><button onclick="saveProfile()">保存并进入世界地图</button><button class="secondary" onclick="showSaved()">教师成绩面板</button></div></div><div id="map" class="card hide"><h2>世界地图</h2><div class="worlds" id="worlds"></div><div class="card"><h3>已获得徽章</h3><div id="badges" class="badgeGrid"></div></div></div><div id="saved" class="card hide"></div></section>
<section id="game" class="hide"><div class="card arena"><div id="taunt" class="taunt">历史不是背诵，是战斗。</div><div class="fighter"><span id="heroSprite" class="sprite">⚔️</span><b id="heroName">Hero</b></div><div class="fighter"><span id="enemySprite" class="sprite enemySprite">♜</span><b id="enemyName">Penjaga</b><div class="bar"><span id="hp" style="width:100%"></span></div><small id="hpText">HP 100 / 100</small></div></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div class="answers" id="answers"></div><div class="toolbar"><button id="hintBtn" class="hint" onclick="useHint()">神秘人 Hint</button></div><div id="feedback" class="card feedback hide"></div></div></section>
<section id="builder" class="hide"><div class="card"><small>PAPER 2 • STRUKTUR BUILDER</small><h2 id="builderTitle"></h2><p id="builderQuestion"></p><div id="slots"></div><div id="builderOptions"></div><div class="toolbar"><button onclick="checkBuilder()">检查答案</button></div><div id="builderFeedback" class="card hide"></div></div></section>
<section id="essay" class="hide"><div class="card"><small>PAPER 2 • ESEI BUILDER</small><h2 id="essayTitle"></h2><p id="essayQuestion"></p><div id="essaySlots"></div><div id="essayOptions" class="essayGrid"></div><div class="toolbar"><button onclick="checkEssay()">形成 SPM Esei</button></div><div id="essayFeedback" class="card hide"></div></div></section>
<section id="result" class="hide"></section>
</main><script>
const worldNames=['Warisan Negara Bangsa','Kebangkitan Nasionalisme','Konflik Dunia','Era Peralihan Kuasa British','Persekutuan Tanah Melayu 1948','Ancaman Komunis dan Darurat','Usaha ke Arah Kemerdekaan','Pilihan Raya','Perlembagaan PTM 1957','Pemasyhuran Kemerdekaan','Kedaulatan Negara','Perlembagaan Persekutuan','Raja Berperlembagaan','Sistem Persekutuan','Pembentukan Malaysia','Cabaran Selepas Pembentukan Malaysia','Membina Kesejahteraan Negara','Membina Kemakmuran Negara','Dasar Luar Malaysia'];
const chars=[{n:'Pahlawan Keris',s:'⚔️',power:'答对攻击强化'},{n:'Puteri Arkib',s:'📜',power:'擅长关键词'},{n:'Penjelajah Masa',s:'⏳',power:'擅长时间线'}];let profile=JSON.parse(localStorage.getItem('sejarahProfile')||'null')||{name:'',char:0,unlocked:1,badges:[]};profile.badges=profile.badges||[];let selectedChar=profile.char||0;
characters.innerHTML=chars.map((c,i)=>`<button class="character ${i===selectedChar?'selected':''}" onclick="selectChar(${i})"><div class="avatar">${c.s}</div><h3>${c.n}</h3><p>${c.power}</p></button>`).join('');studentName.value=profile.name||'';
function selectChar(i){selectedChar=i;document.querySelectorAll('.character').forEach((e,n)=>e.classList.toggle('selected',n===i))}
function saveProfile(){profile={...profile,name:studentName.value.trim()||'Pelajar',char:selectedChar,unlocked:profile.unlocked||1,badges:profile.badges||[]};localStorage.setItem('sejarahProfile',JSON.stringify(profile));playerTop.textContent=profile.name;renderMap();map.classList.remove('hide');saved.classList.add('hide')}
function renderMap(){const best=JSON.parse(localStorage.getItem('sejarahBest')||'{}');worlds.innerHTML=worldNames.map((w,i)=>{const open=i<profile.unlocked;const b=best[i+1];return `<div class="world ${open?'open':'locked'}"><small>WORLD ${i+1}</small><h3>${w}</h3><p>${open?(i<4?'已开放':'即将制作'):'完成前一世界后解锁'}</p>${b?`<p>最佳：${b.score} 分｜${b.accuracy}%</p>`:''}${i<4&&open?`<button onclick="startGame(${i})">进入 World ${i+1}</button>`:''}</div>`}).join('');badges.innerHTML=profile.badges.length?profile.badges.map(x=>`<div class="badge"><strong>${x}</strong></div>`).join(''):'<p>完成 World 后获得徽章。</p>'}
function showSaved(){map.classList.add('hide');saved.classList.remove('hide');const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');saved.innerHTML=`<h2>教师成绩面板</h2><div class="toolbar"><button onclick="downloadCSV()">下载 CSV</button><button class="secondary" onclick="clearHistory()">清除记录</button></div>${history.length?`<div class="tableWrap"><table><thead><tr><th>学生</th><th>World</th><th>分数</th><th>正确率</th><th>错题</th><th>用时</th><th>日期</th></tr></thead><tbody>${history.slice().reverse().map(x=>`<tr><td>${x.name}</td><td>${x.world}</td><td>${x.score}</td><td>${x.accuracy}%</td><td>${x.errors}</td><td>${x.seconds||'-'}s</td><td>${x.date}</td></tr>`).join('')}</tbody></table></div>`:'<p>尚无完成记录。</p>'}`}
function downloadCSV(){const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');if(!h.length)return alert('没有成绩记录');const rows=[['Student','World','Score','Accuracy','Errors','Seconds','Date'],...h.map(x=>[x.name,x.world,x.score,x.accuracy,x.errors,x.seconds||'',x.date])];const csv='\ufeff'+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sejarah-legends-results.csv';a.click()}
function clearHistory(){if(confirm('确定清除所有学生成绩？')){localStorage.removeItem('sejarahHistory');showSaved()}}
const data=[
{enemy:'Penjaga Warisan',icon:'♜',qs:[{q:'Apakah ciri negara bangsa yang berkaitan dengan kawasan pemerintahan?',a:['Rakyat','Wilayah pengaruh','Lambang kebesaran','Undang-undang'],c:1,cn:'Wilayah pengaruh 是君主统治并获得承认的范围。',kw:'kawasan pemerintahan → wilayah pengaruh'},{q:'Siapakah ketua pentadbir dan ketua tentera Kesultanan Melayu Melaka?',a:['Bendahara','Temenggung','Laksamana','Syahbandar'],c:0,cn:'Bendahara 协助苏丹行政，并在战争时统领军队。',kw:'ketua pentadbir + tentera → Bendahara'},{q:'Apakah fungsi undang-undang?',a:['Menjamin keamanan','Menentukan warna bendera','Menghapuskan rakyat','Menggantikan pemerintah'],c:0,cn:'法律维持秩序、安全与人民福祉。',kw:'undang-undang → keamanan'},{q:'Siapakah rakyat Melaka?',a:['Pedagang asing sahaja','Penduduk yang taat kepada sultan','Pembesar sahaja','Tentera sahaja'],c:1,cn:'人民是居住在领土内并效忠苏丹的人。',kw:'rakyat → taat setia kepada sultan'}],bq:'Jelaskan dua ciri negara bangsa Kesultanan Melayu Melaka. [4 markah]',ba:['Melaka mempunyai wilayah pengaruh yang luas dan diakui kawasan lain.','Rakyat memberikan taat setia kepada sultan sebagai pemerintah.'],eq:'Huraikan kepentingan sistem pentadbiran yang tersusun. [8 markah]',ea:['Pentadbiran menjadi lebih teratur kerana tugas pembesar dibahagikan dengan jelas.','Keamanan negara dapat dipelihara apabila undang-undang dilaksanakan dengan berkesan.','Perdagangan berkembang kerana pelabuhan diurus secara sistematik.','Kesannya, Melaka muncul sebagai kerajaan yang kuat dan dihormati.']},
{enemy:'Raksasa Penjajah',icon:'👹',qs:[{q:'Apakah maksud nasionalisme?',a:['Perasaan cinta akan bangsa dan negara','Perdagangan bebas','Kuasa mutlak asing','Sistem cukai'],c:0,cn:'民族主义指对民族与国家的热爱，并争取自由与主权。',kw:'nasionalisme → cinta bangsa dan negara'},{q:'Revolusi Keagungan berlaku di...',a:['England','Perancis','China','India'],c:0,cn:'Glorious Revolution 发生在 England。',kw:'Revolusi Keagungan → England'},{q:'Tokoh nasionalisme Filipina ialah...',a:['Jose Rizal','Sun Yat Sen','Mahatma Gandhi','Soekarno'],c:0,cn:'Jose Rizal 通过写作唤醒菲律宾民族意识。',kw:'Filipina → Jose Rizal'},{q:'Akhbar digunakan oleh nasionalis untuk...',a:['menyebarkan idea perjuangan','menutup sekolah','menghapus bahasa','membantu penjajah'],c:0,cn:'报章是传播改革与民族主义思想的重要媒介。',kw:'akhbar → sebar idea nasionalisme'}],bq:'Jelaskan dua faktor kemunculan nasionalisme di negara kita. [4 markah]',ba:['Peranan media cetak menyebarkan idea pembaharuan dan perjuangan.','Sistem pendidikan melahirkan golongan intelektual yang sedar tentang nasib bangsa.'],eq:'Huraikan kepentingan semangat nasionalisme kepada negara. [8 markah]',ea:['Nasionalisme menyatukan rakyat dalam usaha mempertahankan tanah air.','Semangat ini mendorong rakyat menolak penjajahan dan menuntut kebebasan.','Rakyat juga lebih sanggup berkorban demi kepentingan negara.','Kesannya, kedaulatan dan identiti negara dapat dipelihara.']},
{enemy:'Panglima Dunia',icon:'🛡️',qs:[{q:'Apakah faktor tercetusnya Perang Dunia Pertama?',a:['Persaingan kuasa imperialis','Kemajuan pendidikan','Perdagangan tempatan','Pilihan raya'],c:0,cn:'列强争夺殖民地、军备竞赛与联盟对立推动第一次世界大战爆发。',kw:'Perang Dunia Pertama → persaingan imperialis'},{q:'Perang Dunia Kedua di Eropah bermula apabila Jerman menyerang...',a:['Poland','China','India','Mesir'],c:0,cn:'1939年德国入侵波兰，欧洲战场爆发。',kw:'1939 → Jerman serang Poland'},{q:'Ideologi Nazi dipimpin oleh...',a:['Adolf Hitler','Benito Mussolini','Joseph Stalin','Franklin Roosevelt'],c:0,cn:'纳粹党由 Adolf Hitler 领导。',kw:'Nazi → Adolf Hitler'},{q:'Apakah tujuan utama Jepun menguasai Asia Tenggara?',a:['Mendapatkan bahan mentah','Membina sekolah sahaja','Menghapus perdagangan','Mengadakan pilihan raya'],c:0,cn:'日本需要石油、橡胶等原料支持战争工业。',kw:'Jepun → bahan mentah'}],bq:'Jelaskan dua kesan pendudukan Jepun di negara kita. [4 markah]',ba:['Rakyat mengalami kesengsaraan akibat kekurangan makanan dan inflasi.','Pendudukan Jepun meningkatkan kesedaran politik serta semangat menentang penjajahan.'],eq:'Huraikan iktibar daripada konflik dunia. [8 markah]',ea:['Negara perlu mengutamakan rundingan untuk menyelesaikan pertikaian.','Hubungan diplomatik yang baik dapat mengelakkan permusuhan antara negara.','Rakyat mesti bersatu mempertahankan keamanan dan kedaulatan.','Kesannya, kemusnahan nyawa serta harta benda dapat dielakkan.']},
{enemy:'Bayang Malayan Union',icon:'🏰',qs:[{q:'Siapakah yang memperkenalkan Malayan Union?',a:['British','Jepun','Belanda','Portugis'],c:0,cn:'Malayan Union 是英国在二战后提出的新行政制度。',kw:'Malayan Union → British'},{q:'Malayan Union diperkenalkan pada tahun...',a:['1946','1948','1957','1963'],c:0,cn:'Malayan Union 于1946年正式实施。',kw:'Malayan Union → 1946'},{q:'Mengapakah orang Melayu menentang Malayan Union?',a:['Mengancam kedudukan Raja-raja Melayu','Memperkuat kuasa sultan','Meluaskan tanah pertanian','Mengurangkan cukai'],c:0,cn:'该制度削弱马来统治者权力，也引起公民权课题的不满。',kw:'tentangan → kuasa Raja-raja Melayu terancam'},{q:'Siapakah yang mendapatkan tandatangan Raja-raja Melayu?',a:['Harold MacMichael','Henry Gurney','Frank Swettenham','Edward Gent'],c:0,cn:'Harold MacMichael 负责取得马来统治者签名。',kw:'tandatangan Raja-raja Melayu → Harold MacMichael'}],bq:'Jelaskan dua sebab orang Melayu menentang Malayan Union. [4 markah]',ba:['Malayan Union menghakis kuasa Raja-raja Melayu dalam pemerintahan.','Syarat kewarganegaraan yang longgar menimbulkan kebimbangan orang Melayu.'],eq:'Huraikan kesan penentangan terhadap Malayan Union. [8 markah]',ea:['Penentangan menyatukan orang Melayu melalui gerakan politik yang tersusun.','UMNO ditubuhkan untuk mempertahankan kepentingan bangsa Melayu.','British akhirnya menggantikan Malayan Union dengan Persekutuan Tanah Melayu 1948.','Kesannya, kedudukan Raja-raja Melayu dan orang Melayu dapat dipulihkan.']}
];
let world=0,qs=[],index=0,hp=100,score=0,combo=0,hints=3,locked=false,errors=[],selected=[],essaySelected=[],secondsUsed=0,timeLeft=20,timer=null,retryMode=false;
function setView(id){['home','game','builder','essay','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide')}
function sync(){scoreTop.textContent=score;comboTop.textContent=combo;hintTop.textContent=hints;playerTop.textContent=profile.name||'-';hintBtn.disabled=hints<=0;timerTop.textContent=timeLeft;timerPill.classList.toggle('timerLow',timeLeft<=5)}
function startTimer(){clearInterval(timer);timeLeft=20;sync();timer=setInterval(()=>{timeLeft--;secondsUsed++;sync();if(timeLeft<=0){clearInterval(timer);timeOut()}},1000)}
function timeOut(){if(locked)return;locked=true;const x=qs[index];combo=0;errors.push({...x,chosen:-1});document.querySelectorAll('.answer')[x.c].classList.add('ok');feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>时间到，需要订正</b><br><b>正确答案：</b>${x.a[x.c]}<br><b>华语解释：</b>${x.cn}<br><b>关键词：</b>${x.kw}`;feedback.classList.remove('hide');index++;setTimeout(()=>index>=qs.length?finishQuestions():render(),1800)}
function startGame(w,customQs=null){world=w;retryMode=!!customQs;qs=customQs||data[w].qs;index=0;hp=100;score=0;combo=0;hints=3;errors=[];secondsUsed=0;heroSprite.textContent=chars[profile.char].s;heroName.textContent=profile.name;enemySprite.textContent=data[w].icon;enemyName.textContent=retryMode?'错题复仇战':data[w].enemy;setView('game');sync();render()}
function render(){locked=false;const x=qs[index];meta.textContent=`${retryMode?'错题重战':'WORLD '+(world+1)} • SOALAN ${index+1}/${qs.length}`;question.textContent=x.q;answers.innerHTML=x.a.map((v,n)=>`<button class="answer" data-n="${n}" onclick="pick(${n},this)">${String.fromCharCode(65+n)}. ${v}</button>`).join('');feedback.className='card feedback hide';taunt.textContent=retryMode?'这次别再掉进同一个陷阱。':combo>=3?'不错，但下一题会让你掉分。':index>qs.length/2?'你的分数追得上我吗？':'历史不是背诵，是战斗。';startTimer()}
function pick(n,b){if(locked)return;locked=true;clearInterval(timer);const x=qs[index];document.querySelectorAll('.answer')[x.c].classList.add('ok');if(n===x.c){combo++;const speedBonus=timeLeft*5,gain=100+(combo-1)*20+speedBonus;score+=gain;hp=Math.max(0,hp-Math.ceil(100/qs.length));heroSprite.classList.add('attack');enemySprite.classList.add('hit');feedback.className='card feedback correctBox';feedback.innerHTML=`<b>正确！+${gain} 分</b><br>Combo × ${combo}　速度奖励 +${speedBonus}<br><b>关键词：</b>${x.kw}`}else{combo=0;b.classList.add('bad');errors.push({...x,chosen:n});feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>需要订正</b><br><b>华语解释：</b>${x.cn}<br><b>正确答案：</b>${x.a[x.c]}<br><b>马来文关键词：</b>${x.kw}`}feedback.classList.remove('hide');hp.style.width=hp+'%';hpText.textContent=`HP ${hp} / 100`;sync();setTimeout(()=>{heroSprite.classList.remove('attack');enemySprite.classList.remove('hit')},500);index++;setTimeout(()=>index>=qs.length?finishQuestions():render(),1900)}
function finishQuestions(){retryMode?showRetryResult():startBuilder()}
function useHint(){if(locked||hints<=0)return;hints--;const x=qs[index];[0,1,2,3].filter(n=>n!==x.c).sort(()=>Math.random()-.5).slice(0,2).forEach(n=>document.querySelector(`[data-n="${n}"]`).disabled=true);feedback.className='card feedback';feedback.innerHTML='<b>神秘人泪光闪闪地出现：</b> 已排除两个错误答案。';feedback.classList.remove('hide');sync()}
function startBuilder(){clearInterval(timer);setView('builder');selected=[];builderTitle.textContent=`World ${world+1} Struktur Challenge`;builderQuestion.textContent=data[world].bq;renderBuilder()}
function renderBuilder(){slots.innerHTML=[0,1].map(i=>`<div class="builderSlot">${selected[i]||`Isi ${i+1}：点击下方答案`}</div>`).join('');const wrong=['Jawapan ini tidak berkaitan dengan kehendak soalan.','Fakta ini bercanggah dengan kandungan bab.'];builderOptions.innerHTML=[...data[world].ba,...wrong].map(v=>`<button class="builderOption" onclick='chooseBuilder(${JSON.stringify(v)})'>${v}</button>`).join('')}
function chooseBuilder(v){if(!selected.includes(v)&&selected.length<2){selected.push(v);renderBuilder()}}
function checkBuilder(){const ok=data[world].ba.every(v=>selected.includes(v));builderFeedback.classList.remove('hide');if(ok){score+=400;builderFeedback.className='card correctBox';builderFeedback.innerHTML='<b>Struktur：4/4 分</b><br>两个完整 isi + huraian。';setTimeout(startEssay,1000)}else{builderFeedback.className='card wrongBox';builderFeedback.innerHTML='<b>答案不完整。</b><br>重新选择两个符合课本内容的完整句子。';selected=[];renderBuilder()}sync()}
function startEssay(){setView('essay');essaySelected=[];essayTitle.textContent=`World ${world+1} Esei Challenge`;essayQuestion.textContent=data[world].eq;renderEssay()}
function renderEssay(){essaySlots.innerHTML=['Isi 1','Huraian 1','Isi 2','Penegasan'].map((x,i)=>`<div class="builderSlot"><b>${x}</b><br>${essaySelected[i]||'尚未选择'}</div>`).join('');const wrong=['Fakta ini tidak menjawab kehendak soalan.','Jawapan terlalu umum dan tidak mempunyai kaitan sejarah.'];essayOptions.innerHTML=[...data[world].ea,...wrong].sort(()=>Math.random()-.5).map(v=>`<button class="essayCard ${essaySelected.includes(v)?'selected':''}" onclick='chooseEssay(${JSON.stringify(v)})'>${v}</button>`).join('')}
function chooseEssay(v){if(!essaySelected.includes(v)&&essaySelected.length<4){essaySelected.push(v);renderEssay()}}
function checkEssay(){const ok=data[world].ea.every(v=>essaySelected.includes(v));essayFeedback.classList.remove('hide');if(ok){score+=800;essayFeedback.className='card correctBox';essayFeedback.innerHTML=`<b>Esei：8/8 分</b><br><br>${data[world].ea.join(' ')}`;setTimeout(showResult,1300)}else{essayFeedback.className='card wrongBox';essayFeedback.innerHTML='<b>Esei belum lengkap.</b><br>选择四个与题目直接相关的句子。';essaySelected=[];renderEssay()}sync()}
function awardBadges(accuracy){const list=[];if(accuracy===100)list.push('完美史官');if(secondsUsed<=40)list.push('闪电答题王');if(errors.length===0)list.push('零错战神');list.push(`World ${world+1} 征服者`);list.forEach(x=>{if(!profile.badges.includes(x))profile.badges.push(x)});localStorage.setItem('sejarahProfile',JSON.stringify(profile));return list}
function showResult(){setView('result');const correct=qs.length-errors.length,accuracy=Math.round(correct/qs.length*100);if(profile.unlocked<world+2&&world<3){profile.unlocked=world+2}const newBadges=awardBadges(accuracy);localStorage.setItem('sejarahProfile',JSON.stringify(profile));const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');history.push({name:profile.name,world:world+1,score,accuracy,errors:errors.length,seconds:secondsUsed,date:new Date().toLocaleString()});localStorage.setItem('sejarahHistory',JSON.stringify(history.slice(-100)));const best=JSON.parse(localStorage.getItem('sejarahBest')||'{}');if(!best[world+1]||score>best[world+1].score)best[world+1]={score,accuracy};localStorage.setItem('sejarahBest',JSON.stringify(best));const next=world<3?`<button onclick="startGame(${world+1})">进入已解锁 World ${world+2}</button>`:'';result.innerHTML=`<div class="card"><small>WORLD ${world+1} COMPLETE</small><h2>${data[world].enemy} 已被击败</h2><div class="scoreBig">${score}</div><p>正确率：${accuracy}%　客观题：${correct}/${qs.length}　Struktur：4/4　Esei：8/8　用时：${secondsUsed}s</p><p>获得徽章：${newBadges.join('、')}</p><div class="toolbar">${next}${errors.length?`<button class="hint" onclick='startGame(${world},${JSON.stringify(errors).replaceAll("'","&#39;")})'>错题复仇战</button>`:''}<button onclick="startGame(${world})">再次挑战</button><button class="secondary" onclick="location.reload()">返回主页</button></div></div><div class="card"><h2>错题订正簿</h2>${errors.length?errors.map((e,i)=>`<div class="reviewItem"><b>${i+1}. ${e.q}</b><br>你的答案：${e.chosen<0?'时间到':e.a[e.chosen]}<br>正确答案：${e.a[e.c]}<br>华语解释：${e.cn}<br>马来文关键词：${e.kw}</div>`).join(''):'<p>本轮没有错题。</p>'}</div>`}
function showRetryResult(){setView('result');const correct=qs.length-errors.length,accuracy=Math.round(correct/qs.length*100);result.innerHTML=`<div class="card"><small>错题复仇战完成</small><h2>${errors.length?'还有错题，需要再战':'全部错题已消灭'}</h2><div class="scoreBig">${accuracy}%</div><div class="toolbar">${errors.length?`<button onclick='startGame(${world},${JSON.stringify(errors).replaceAll("'","&#39;")})'>再战剩余错题</button>`:''}<button class="secondary" onclick="location.reload()">返回世界地图</button></div></div>`}
if(profile.name){playerTop.textContent=profile.name;renderMap();map.classList.remove('hide')}sync();
</script></body></html>
