<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼音王国 World 8：轻声小镇</title>
  <style>
    :root{--ink:#24324a;--blue:#4c6ef5;--purple:#845ef7;--green:#2f9e44;--red:#e03131;--gold:#f59f00;--soft:#f8f9fa}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Arial Rounded MT Bold","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);background:linear-gradient(180deg,#e7f5ff,#fff9db)}
    button{font:inherit}.app{max-width:980px;margin:auto;padding:16px}.hero,.panel{background:rgba(255,255,255,.96);border-radius:28px;padding:18px;box-shadow:0 12px 30px rgba(36,50,74,.12)}
    .hero{text-align:center}.hero h1{margin:0;font-size:clamp(30px,7vw,54px)}.hero p{margin:8px 0 0;font-size:18px}.panel{margin-top:14px}.hidden{display:none!important}
    .lesson-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.lesson{background:var(--soft);border-radius:20px;padding:14px}.lesson strong{display:block;margin-bottom:6px}.examples{font-size:20px;line-height:1.7}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.pill{background:#edf2ff;color:#364fc7;padding:8px 12px;border-radius:999px}.progress{height:16px;background:#e9ecef;border-radius:999px;overflow:hidden;margin:14px 0}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));width:0;transition:.3s}
    .battle{display:grid;grid-template-columns:1fr 1.3fr;gap:14px}.fighter,.boss{border-radius:24px;padding:14px;text-align:center}.fighter{background:#f8f9fa}.boss{background:#f3f0ff}.face{font-size:68px}.hp{height:14px;background:#dee2e6;border-radius:999px;overflow:hidden;margin-top:8px}.hp span{display:block;height:100%;transition:.3s}.fighter .hp span{background:var(--green)}.boss .hp span{background:var(--red)}
    .question{text-align:center;font-size:clamp(28px,6vw,46px);padding:18px 8px}.hint{text-align:center;color:#667085;margin-bottom:12px}.answers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.answer{min-height:84px;border:3px solid #e9ecef;background:#fff;border-radius:22px;font-size:26px;cursor:pointer;transition:.15s}.answer:hover{transform:scale(1.02);border-color:var(--purple)}.answer.correct{background:#d3f9d8;border-color:var(--green)}.answer.wrong{background:#ffe3e3;border-color:var(--red)}
    .combo{text-align:center;font-size:24px;color:var(--gold);min-height:34px}.message{text-align:center;min-height:44px;background:#f8f9fa;border-radius:18px;padding:12px;margin-top:12px}.skills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}.skill{border:2px solid #e9ecef;background:white;border-radius:16px;padding:9px 13px;cursor:pointer}.skill:disabled{opacity:.45;cursor:not-allowed}.primary{border:0;background:var(--blue);color:white;border-radius:18px;padding:14px 18px;cursor:pointer}.secondary{border:0;background:#f1f3f5;color:var(--ink);border-radius:18px;padding:14px 18px;cursor:pointer}.reward{text-align:center}.reward .big{font-size:86px}.stars{font-size:28px;letter-spacing:4px}.shake{animation:shake .35s}@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
    @media(max-width:680px){.battle,.answers,.lesson-grid{grid-template-columns:1fr}.face{font-size:58px}}
  </style>
</head>
<body>
<main class="app">
  <section class="hero"><h1>☁️ 轻声小镇</h1><p>轻轻读、仔细听，赶走轻声幽灵！</p></section>

  <section id="lessonPanel" class="panel">
    <h2>先学会轻声规则</h2>
    <div class="lesson-grid">
      <div class="lesson"><strong>名词、动词重叠</strong><div class="examples">妈妈、想想</div></div>
      <div class="lesson"><strong>词尾与助词</strong><div class="examples">我们、多些、吗、吧、呢、的、地、得、着、了、过</div></div>
      <div class="lesson"><strong>方位、趋向、量词</strong><div class="examples">路上、水里、下来、几个</div></div>
      <div class="lesson"><strong>一和不在中间</strong><div class="examples">看一看、好不好</div></div>
      <div class="lesson"><strong>四音节词</strong><div class="examples">马马虎虎</div></div>
      <div class="lesson"><strong>无规律轻声</strong><div class="examples">朋友、消息、事情、清楚、舒服</div></div>
    </div>
    <button id="startBtn" class="primary" type="button" style="width:100%;margin-top:16px">开始挑战</button>
  </section>

  <section id="gamePanel" class="panel hidden">
    <div class="top"><button id="backBtn" class="secondary" type="button">← 返回拼音王国</button><span class="pill" id="round">第 1 / 30 题</span><span class="pill">⭐ <span id="score">0</span></span></div>
    <div class="progress"><span id="progress"></span></div>
    <div class="battle">
      <div id="fighter" class="fighter"><div class="face">🐰</div><strong>小兔勇士</strong><div class="hp"><span id="playerHp" style="width:100%"></span></div><div id="playerHpText">100 HP</div></div>
      <div id="boss" class="boss"><div class="face">👻</div><strong>轻声幽灵</strong><div class="hp"><span id="bossHp" style="width:100%"></span></div><div id="bossHpText">3000 HP</div></div>
    </div>
    <div id="combo" class="combo"></div>
    <div id="question" class="question">准备开始</div>
    <div id="hint" class="hint">选出正确答案。</div>
    <div id="answers" class="answers"></div>
    <div class="skills"><button id="hintSkill" class="skill" type="button">💡 提示 × 3</button><button id="shieldSkill" class="skill" type="button">🛡️ 护盾 × 1</button></div>
    <div id="message" class="message">开始挑战吧！</div>
  </section>

  <section id="rewardPanel" class="panel reward hidden">
    <div class="big">🏆</div><h2>轻声幽灵被赶走了！</h2><div id="stars" class="stars">⭐⭐⭐</div><p id="summary"></p>
    <button id="againBtn" class="primary" type="button">再玩一次</button><button id="homeBtn" class="secondary" type="button">回到拼音王国</button>
  </section>
</main>
<script>
const base=[
['“妈妈”第二个“妈”怎么读？','轻声',['第一声','第二声','第三声','轻声'],'名词重叠，第二个音节常读轻声。'],
['“想想”第二个“想”怎么读？','轻声',['第一声','第二声','第三声','轻声'],'动词重叠，第二个音节常读轻声。'],
['“我们”的“们”怎么读？','轻声',['第二声','第三声','第四声','轻声'],'代词词尾“们”通常读轻声。'],
['“多些”的“些”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'词尾“些”通常读轻声。'],
['“好吗”的“吗”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'语气助词“吗”读轻声。'],
['“好吧”的“吧”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'语气助词“吧”读轻声。'],
['“你呢”的“呢”怎么读？','轻声',['第一声','第二声','第三声','轻声'],'语气助词“呢”读轻声。'],
['“好的”的“的”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'结构助词“的”读轻声。'],
['“慢慢地走”的“地”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'结构助词“地”读轻声。'],
['“跑得快”的“得”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'结构助词“得”读轻声。'],
['“看着”的“着”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'动态助词“着”读轻声。'],
['“来了”的“了”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'动态助词“了”读轻声。'],
['“读过”的“过”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'动态助词“过”读轻声。'],
['“路上”的“上”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'方位词放在词尾时常读轻声。'],
['“水里”的“里”怎么读？','轻声',['第一声','第二声','第三声','轻声'],'方位词“里”常读轻声。'],
['“下来”的“来”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'趋向动词放在后面时常读轻声。'],
['“几个”的“个”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'量词“个”常读轻声。'],
['“看一看”中间的“一”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'“一”夹在重叠动词中间读轻声。'],
['“好不好”中间的“不”怎么读？','轻声',['第一声','第二声','第四声','轻声'],'“不”夹在重叠形式中间读轻声。'],
['“马马虎虎”第二个音节怎么读？','轻声',['第一声','第二声','第三声','轻声'],'四音节重叠词的第二音节常读轻声。'],
['哪一个词常读轻声？','朋友',['苹果','朋友','天空','学校'],'“朋友”是常见无规律轻声词。'],
['哪一个词常读轻声？','消息',['老师','消息','白云','花园'],'“消息”是常见无规律轻声词。'],
['哪一个词常读轻声？','事情',['红色','事情','太阳','河流'],'“事情”是常见无规律轻声词。'],
['哪一个词常读轻声？','意思',['音乐','意思','大海','电脑'],'“意思”是常见无规律轻声词。'],
['哪一个词常读轻声？','脾气',['脾气','空气','天气','勇气'],'“脾气”是常见无规律轻声词。'],
['哪一个词常读轻声？','脑袋',['口袋','脑袋','海带','时代'],'“脑袋”是常见无规律轻声词。'],
['哪一个词常读轻声？','清楚',['清晨','清楚','清水','清香'],'“清楚”是常见无规律轻声词。'],
['哪一个词常读轻声？','暖和',['温暖','暖和','暖气','暖流'],'“暖和”是常见无规律轻声词。'],
['哪一个词常读轻声？','舒服',['书本','舒服','书包','书法'],'“舒服”是常见无规律轻声词。'],
['轻声的拼音上应该怎样？','不标调号',['标第一声','标第二声','标第四声','不标调号'],'轻声不标声调符号。']
];
const questions=base.map(x=>({q:x[0],a:x[1],c:x[2],tip:x[3]}));
const $=id=>document.getElementById(id);let order=[],index=0,score=0,combo=0,player=100,boss=3000,locked=false,hints=3,shield=1,shieldOn=false,correct=0;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function start(){order=shuffle(questions);index=0;score=0;combo=0;player=100;boss=3000;locked=false;hints=3;shield=1;shieldOn=false;correct=0;$('lessonPanel').classList.add('hidden');$('rewardPanel').classList.add('hidden');$('gamePanel').classList.remove('hidden');update();render()}
function render(){locked=false;const item=order[index];$('round').textContent=`第 ${index+1} / ${order.length} 题`;$('progress').style.width=`${index/order.length*100}%`;$('question').textContent=item.q;$('hint').textContent='选出正确答案。';$('answers').innerHTML='';shuffle(item.c).forEach(choice=>{const b=document.createElement('button');b.type='button';b.className='answer';b.textContent=choice;b.addEventListener('click',()=>answer(b,choice,item));$('answers').appendChild(b)});$('message').textContent='听起来轻轻的，就是轻声。';updateSkills()}
function answer(btn,choice,item){if(locked)return;locked=true;const buttons=[...document.querySelectorAll('.answer')];if(choice===item.a){btn.classList.add('correct');combo++;correct++;const damage=100+Math.min(combo,5)*20;score+=damage;boss=Math.max(0,boss-damage);$('boss').classList.add('shake');setTimeout(()=>$('boss').classList.remove('shake'),350);$('message').textContent=`答对了！${item.tip}`}else{btn.classList.add('wrong');combo=0;const right=buttons.find(x=>x.textContent===item.a);if(right)right.classList.add('correct');if(shieldOn){shieldOn=false;$('message').textContent=`护盾挡住攻击！正确答案是“${item.a}”。${item.tip}`}else{player=Math.max(0,player-10);$('fighter').classList.add('shake');setTimeout(()=>$('fighter').classList.remove('shake'),350);$('message').textContent=`差一点。正确答案是“${item.a}”。${item.tip}`}}buttons.forEach(x=>x.disabled=true);update();setTimeout(()=>{index++;if(index>=order.length||boss<=0)finish();else render()},1500)}
function update(){$('score').textContent=score;$('playerHp').style.width=player+'%';$('playerHpText').textContent=player+' HP';$('bossHp').style.width=(boss/3000*100)+'%';$('bossHpText').textContent=boss+' HP';$('combo').textContent=combo>=10?'🔥 LEGEND ×'+combo:combo>=5?'⚡ ULTRA ×'+combo:combo>=2?'🔥 COMBO ×'+combo:'';updateSkills()}
function updateSkills(){$('hintSkill').textContent='💡 提示 × '+hints;$('shieldSkill').textContent=shieldOn?'🛡️ 护盾已开启':'🛡️ 护盾 × '+shield;$('hintSkill').disabled=hints<=0||locked;$('shieldSkill').disabled=shield<=0||shieldOn||locked}
function finish(){$('gamePanel').classList.add('hidden');$('rewardPanel').classList.remove('hidden');const rate=Math.round(correct/order.length*100);$('stars').textContent=rate>=90?'⭐⭐⭐':rate>=70?'⭐⭐':'⭐';$('summary').textContent=`答对 ${correct} / ${order.length} 题，正确率 ${rate}%，获得 ${score} 分。`;localStorage.setItem('pinyin-world8-complete','1')}
$('hintSkill').addEventListener('click',()=>{if(hints<=0||locked)return;hints--;const item=order[index];const wrong=[...document.querySelectorAll('.answer')].filter(b=>b.textContent!==item.a);shuffle(wrong).slice(0,2).forEach(b=>{b.disabled=true;b.style.opacity='.28'});$('hint').textContent='已经帮你排除两个错误答案。';updateSkills()});
$('shieldSkill').addEventListener('click',()=>{if(shield<=0||shieldOn||locked)return;shield--;shieldOn=true;$('message').textContent='护盾开启！下一次答错不会扣血。';updateSkills()});
$('startBtn').addEventListener('click',start);$('againBtn').addEventListener('click',start);$('backBtn').addEventListener('click',()=>location.href='index.html');$('homeBtn').addEventListener('click',()=>location.href='index.html');
</script>
</body>
</html>
