<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title><style>:root{--bg:#07111f;--panel:#10213a;--panel2:#132945;--line:#31547c;--gold:#f3c65d;--text:#eef4ff;--green:#2b936c;--red:#a43d50;--purple:#6b59bb}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#17345b,#07111f 48%);color:var(--text);min-height:100vh}.app{max-width:1120px;margin:auto;padding:16px}.card{background:rgba(16,33,58,.96);border:1px solid #29496f;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 14px 38px #0005}button,input{padding:13px 16px;border:0;border-radius:12px;font-weight:800}button{background:var(--gold);cursor:pointer;transition:.18s}button:hover{transform:translateY(-2px);filter:brightness(1.08)}button:disabled{opacity:.35;cursor:not-allowed;transform:none}input{background:#09192c;color:#fff;border:1px solid #31547c;width:100%;margin:8px 0}.top,.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.top{justify-content:space-between}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#0b1a2e;border:1px solid #31547c;border-radius:999px;padding:8px 12px;font-weight:700}.hide{display:none!important}.worlds,.characters,.essayGrid,.badgeGrid,.routeGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.world,.character,.essayCard,.badge,.route{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:17px}.world.open,.character.selected,.essayCard.selected{border-color:var(--gold);box-shadow:0 0 20px #f3c65d33}.locked{opacity:.4}.avatar{font-size:52px;text-align:center}.arena{position:relative;min-height:230px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:end;overflow:hidden;background:linear-gradient(#1a3151,#0b1728);border-radius:18px;padding:25px}.fighter{text-align:center}.sprite{font-size:78px;display:block;filter:drop-shadow(0 10px 8px #0008)}.enemySprite{animation:float 2s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}.attack{animation:attack .45s}@keyframes attack{50%{transform:translateX(65px) scale(1.12)}}.hit{animation:hit .45s}@keyframes hit{25%{transform:translateX(-12px);filter:brightness(2)}50%{transform:translateX(12px)}}.taunt{position:absolute;top:12px;right:18px;background:#7a2f3e;padding:9px 13px;border-radius:14px;max-width:55%;font-weight:700}.bar{height:15px;background:#07111f;border-radius:20px;overflow:hidden;border:1px solid #29496f}.bar span{display:block;height:100%;background:linear-gradient(90deg,#e44d68,#ff8c62);transition:.45s}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer,.builderOption{text-align:left;background:#17304f;color:#fff;border:1px solid #3c638d}.answer.ok{background:var(--green)}.answer.bad{background:var(--red)}.feedback{line-height:1.65}.correctBox{border-left:5px solid var(--green)}.wrongBox{border-left:5px solid var(--red)}.secondary{background:#25496f;color:#fff}.hint{background:var(--purple);color:#fff}.progress{font-size:13px;color:#aecaee}.reviewItem{background:#0b1a2e;border:1px solid #29496f;border-radius:14px;padding:14px;margin:10px 0}.builderOption{display:block;width:100%;margin:8px 0}.builderSlot{min-height:50px;border:2px dashed #50759e;border-radius:12px;padding:12px;margin:9px 0}.scoreBig{font-size:52px;font-weight:900;color:var(--gold)}.timerLow{background:#7a2f3e!important}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #29496f;text-align:left;white-space:nowrap}.route strong,.badge strong{color:var(--gold)}@media(max-width:680px){.answers{grid-template-columns:1fr}.arena{min-height:190px;padding:15px}.sprite{font-size:58px}.taunt{font-size:12px}.app{padding:9px}.card{padding:15px}}</style></head><body><main class="app"><section class="card top"><div><small>KSSM FORM 4 + FORM 5</small><h1 style="margin:.25rem 0">SEJARAH LEGENDS</h1><div class="progress">Battle RPG • 华语订正 • Paper 2 Builder</div></div><div class="stats"><span class="pill">玩家 <b id="playerTop">-</b></span><span class="pill">分数 <b id="scoreTop">0</b></span><span class="pill">Combo <b id="comboTop">0</b></span><span class="pill">Hints <b id="hintTop">3</b></span><span id="timerPill" class="pill">时间 <b id="timerTop">20</b>s</span></div></section><section id="home"><div class="card"><h2>学生档案</h2><input id="studentName" placeholder="输入学生名字"><h3>选择角色</h3><div class="characters" id="characters"></div><div class="toolbar"><button onclick="saveProfile()">保存并进入地图</button><button class="secondary" onclick="showSaved()">教师成绩面板</button></div></div><div id="map" class="card hide"><h2>世界地图</h2><div class="worlds" id="worlds"></div><div class="card"><h3>复习路线</h3><div id="revisionRoute" class="routeGrid"></div></div><div class="card"><h3>已获得徽章</h3><div id="badges" class="badgeGrid"></div></div></div><div id="saved" class="card hide"></div></section><section id="game" class="hide"><div class="card arena"><div id="taunt" class="taunt">历史不是背诵，是战斗。</div><div class="fighter"><span id="heroSprite" class="sprite">⚔️</span><b id="heroName">Hero</b></div><div class="fighter"><span id="enemySprite" class="sprite enemySprite">♜</span><b id="enemyName">Penjaga</b><div class="bar"><span id="hpBar" style="width:100%"></span></div><small id="hpText">HP 100 / 100</small></div></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div class="answers" id="answers"></div><div class="toolbar"><button id="hintBtn" class="hint" onclick="useHint()">神秘人 Hint</button><button id="nextBtn" class="secondary hide" onclick="nextQuestion()">下一题</button></div><div id="feedback" class="card feedback hide"></div></div></section><section id="builder" class="hide"><div class="card"><small>PAPER 2 • STRUKTUR BUILDER</small><h2 id="builderTitle"></h2><p id="builderQuestion"></p><div id="slots"></div><div id="builderOptions"></div><div class="toolbar"><button onclick="checkBuilder()">检查答案</button></div><div id="builderFeedback" class="card hide"></div></div></section><section id="essay" class="hide"><div class="card"><small>PAPER 2 • ESEI BUILDER</small><h2 id="essayTitle"></h2><p id="essayQuestion"></p><div id="essaySlots"></div><div id="essayOptions" class="essayGrid"></div><div class="toolbar"><button onclick="checkEssay()">形成 SPM Esei</button></div><div id="essayFeedback" class="card hide"></div></div></section><section id="result" class="hide"></section></main><script>const $=id=>document.getElementById(id);const worldNames=['Warisan Negara Bangsa','Kebangkitan Nasionalisme','Konflik Dunia','Era Peralihan Kuasa British','Persekutuan Tanah Melayu 1948','Ancaman Komunis dan Darurat','Usaha ke Arah Kemerdekaan','Pilihan Raya','Perlembagaan PTM 1957','Pemasyhuran Kemerdekaan','Kedaulatan Negara','Perlembagaan Persekutuan','Raja Berperlembagaan','Sistem Persekutuan','Pembentukan Malaysia','Cabaran Selepas Pembentukan Malaysia','Membina Kesejahteraan Negara','Membina Kemakmuran Negara','Dasar Luar Malaysia'];const chars=[{n:'Pahlawan Keris',s:'⚔️',power:'答对攻击强化'},{n:'Puteri Arkib',s:'📜',power:'擅长关键词'},{n:'Penjelajah Masa',s:'⏳',power:'擅长时间线'}];const data=[{enemy:'Penjaga Warisan',icon:'♜',qs:[{q:'Apakah ciri negara bangsa yang berkaitan dengan kawasan pemerintahan?',a:['Rakyat','Wilayah pengaruh','Lambang kebesaran','Undang-undang'],c:1,cn:'Wilayah pengaruh 是君主统治并获得承认的范围。',kw:'kawasan pemerintahan → wilayah pengaruh'},{q:'Siapakah ketua pentadbir dan ketua tentera Kesultanan Melayu Melaka?',a:['Bendahara','Temenggung','Laksamana','Syahbandar'],c:0,cn:'Bendahara 协助苏丹行政并统领军队。',kw:'ketua pentadbir + tentera → Bendahara'},{q:'Apakah fungsi undang-undang?',a:['Menjamin keamanan','Menentukan warna bendera','Menghapuskan rakyat','Menggantikan pemerintah'],c:0,cn:'法律维持秩序、安全与人民福祉。',kw:'undang-undang → keamanan'},{q:'Apakah lambang kedaulatan Sultan Melaka?',a:['Cap mohor','Sawah padi','Pelabuhan','Pasar'],c:0,cn:'Cap mohor 是苏丹权力和官方命令的象征。',kw:'kedaulatan → cap mohor'}],bq:'Jelaskan dua ciri negara bangsa Kesultanan Melayu Melaka. [4 markah]',ba:['Melaka mempunyai wilayah pengaruh yang luas dan diakui kawasan lain.','Rakyat memberikan taat setia kepada sultan sebagai pemerintah.'],eq:'Huraikan kepentingan sistem pentadbiran yang tersusun. [8 markah]',ea:['Pentadbiran menjadi lebih teratur kerana tugas pembesar dibahagikan dengan jelas.','Keamanan negara dapat dipelihara apabila undang-undang dilaksanakan dengan berkesan.','Perdagangan berkembang kerana pelabuhan diurus secara sistematik.','Kesannya, Melaka muncul sebagai kerajaan yang kuat dan dihormati.']}];let profile=JSON.parse(localStorage.getItem('sejarahProfile')||'null')||{name:'',char:0,unlocked:1,badges:[]};profile.badges=profile.badges||[];let selectedChar=profile.char||0,world=0,questions=[],index=0,enemyHp=100,score=0,combo=0,hints=3,locked=false,errors=[],timeLeft=20,timer=null,selected=[],essaySelected=[];function setView(id){['home','game','builder','essay','result'].forEach(x=>$(x).classList.add('hide'));$(id).classList.remove('hide')}function sync(){playerTop.textContent=profile.name||'-';scoreTop.textContent=score;comboTop.textContent=combo;hintTop.textContent=hints;timerTop.textContent=timeLeft;timerPill.classList.toggle('timerLow',timeLeft<=5);hintBtn.disabled=hints<=0}function selectChar(i){selectedChar=i;document.querySelectorAll('.character').forEach((e,n)=>e.classList.toggle('selected',n===i))}characters.innerHTML=chars.map((c,i)=>`<button class="character ${i===selectedChar?'selected':''}" onclick="selectChar(${i})"><div class="avatar">${c.s}</div><h3>${c.n}</h3><p>${c.power}</p></button>`).join('');studentName.value=profile.name||'';function saveProfile(){profile={...profile,name:studentName.value.trim()||'Pelajar',char:selectedChar};localStorage.setItem('sejarahProfile',JSON.stringify(profile));renderMap();map.classList.remove('hide');saved.classList.add('hide');sync()}function renderMap(){worlds.innerHTML=worldNames.map((w,i)=>`<div class="world ${i<profile.unlocked?'open':'locked'}"><small>WORLD ${i+1}</small><h3>${w}</h3><p>${i===0?'已开放':'即将制作'}</p>${i===0?'<button onclick="startGame(0)">进入 World 1</button>':''}</div>`).join('');badges.innerHTML=profile.badges.length?profile.badges.map(x=>`<div class="badge"><strong>${x}</strong></div>`).join(''):'<p>完成 World 后获得徽章。</p>';revisionRoute.innerHTML='<p>完成 World 后自动生成复习路线。</p>'}function showSaved(){map.classList.add('hide');saved.classList.remove('hide');const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');saved.innerHTML='<h2>教师成绩面板</h2>'+(h.length?h.slice().reverse().map(x=>`<div class="reviewItem"><b>${x.name}</b> World ${x.world}｜${x.score}分｜${x.accuracy}%</div>`).join(''):'<p>尚无成绩。</p>')}function startGame(w){clearInterval(timer);world=w;questions=data[w].qs;index=0;enemyHp=100;score=0;combo=0;hints=3;errors=[];heroSprite.textContent=chars[profile.char||0].s;heroName.textContent=profile.name||'Pelajar';enemySprite.textContent=data[w].icon;enemyName.textContent=data[w].enemy;hpBar.style.width='100%';hpText.textContent='HP 100 / 100';setView('game');renderQuestion()}function renderQuestion(){clearInterval(timer);locked=false;nextBtn.classList.add('hide');feedback.className='card feedback hide';const x=questions[index];meta.textContent=`WORLD ${world+1} • SOALAN ${index+1}/${questions.length}`;question.textContent=x.q;answers.innerHTML=x.a.map((v,n)=>`<button class="answer" data-n="${n}" onclick="pick(${n},this)">${String.fromCharCode(65+n)}. ${v}</button>`).join('');timeLeft=20;sync();timer=setInterval(()=>{timeLeft--;sync();if(timeLeft<=0){clearInterval(timer);handleTimeout()}},1000)}function pick(n,btn){if(locked)return;locked=true;clearInterval(timer);const x=questions[index];const answerButtons=[...document.querySelectorAll('.answer')];answerButtons.forEach(b=>b.disabled=true);answerButtons[x.c].classList.add('ok');if(n===x.c){combo++;score+=100+combo*20;enemyHp=Math.max(0,enemyHp-Math.ceil(100/questions.length));heroSprite.classList.add('attack');enemySprite.classList.add('hit');feedback.className='card feedback correctBox';feedback.innerHTML=`<b>正确！</b><br>Combo × ${combo}<br><b>关键词：</b>${x.kw}`}else{combo=0;btn.classList.add('bad');errors.push({...x,chosen:n});feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>需要订正</b><br><b>华语解释：</b>${x.cn}<br><b>正确答案：</b>${x.a[x.c]}<br><b>关键词：</b>${x.kw}`}feedback.classList.remove('hide');hpBar.style.width=enemyHp+'%';hpText.textContent=`HP ${enemyHp} / 100`;sync();nextBtn.classList.remove('hide');setTimeout(()=>{heroSprite.classList.remove('attack');enemySprite.classList.remove('hit')},500);setTimeout(()=>{if(locked)nextQuestion()},2200)}function handleTimeout(){if(locked)return;locked=true;const x=questions[index];const answerButtons=[...document.querySelectorAll('.answer')];answerButtons.forEach(b=>b.disabled=true);answerButtons[x.c].classList.add('ok');errors.push({...x,chosen:-1});combo=0;feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>时间到</b><br><b>正确答案：</b>${x.a[x.c]}<br><b>华语解释：</b>${x.cn}`;feedback.classList.remove('hide');nextBtn.classList.remove('hide');setTimeout(()=>{if(locked)nextQuestion()},2200)}function nextQuestion(){if(!locked)return;locked=false;index++;if(index>=questions.length){startBuilder()}else{renderQuestion()}}function useHint(){if(locked||hints<=0)return;hints--;const x=questions[index];[0,1,2,3].filter(n=>n!==x.c).sort(()=>Math.random()-.5).slice(0,2).forEach(n=>{const b=document.querySelector(`[data-n="${n}"]`);if(b)b.disabled=true});feedback.className='card feedback';feedback.innerHTML='<b>神秘人：</b>已排除两个错误答案。';feedback.classList.remove('hide');sync()}function startBuilder(){clearInterval(timer);setView('builder');selected=[];builderTitle.textContent='World 1 Struktur Challenge';builderQuestion.textContent=data[world].bq;renderBuilder()}function renderBuilder(){slots.innerHTML=[0,1].map(i=>`<div class="builderSlot">${selected[i]||`Isi ${i+1}`}</div>`).join('');const opts=[...data[world].ba,'Jawapan tidak berkaitan.','Fakta bercanggah dengan bab.'];builderOptions.innerHTML=opts.map(v=>`<button class="builderOption" onclick='chooseBuilder(${JSON.stringify(v)})'>${v}</button>`).join('')}function chooseBuilder(v){if(!selected.includes(v)&&selected.length<2){selected.push(v);renderBuilder()}}function checkBuilder(){const ok=data[world].ba.every(v=>selected.includes(v));builderFeedback.classList.remove('hide');if(ok){score+=400;builderFeedback.className='card correctBox';builderFeedback.innerHTML='<b>Struktur 4/4</b>';setTimeout(startEssay,800)}else{selected=[];renderBuilder();builderFeedback.className='card wrongBox';builderFeedback.innerHTML='重新选择两个符合课本内容的答案。'}sync()}function startEssay(){setView('essay');essaySelected=[];essayTitle.textContent='World 1 Esei Challenge';essayQuestion.textContent=data[world].eq;renderEssay()}function renderEssay(){essaySlots.innerHTML=['Isi 1','Huraian 1','Isi 2','Penegasan'].map((x,i)=>`<div class="builderSlot"><b>${x}</b><br>${essaySelected[i]||'尚未选择'}</div>`).join('');essayOptions.innerHTML=data[world].ea.map(v=>`<button class="essayCard ${essaySelected.includes(v)?'selected':''}" onclick='chooseEssay(${JSON.stringify(v)})'>${v}</button>`).join('')}function chooseEssay(v){if(!essaySelected.includes(v)&&essaySelected.length<4){essaySelected.push(v);renderEssay()}}function checkEssay(){if(data[world].ea.every(v=>essaySelected.includes(v))){score+=800;showResult()}else{essaySelected=[];renderEssay();essayFeedback.className='card wrongBox';essayFeedback.innerHTML='请选择四个完整要点。';essayFeedback.classList.remove('hide')}}function showResult(){setView('result');const correct=questions.length-errors.length,accuracy=Math.round(correct/questions.length*100);const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');history.push({name:profile.name||'Pelajar',world:1,score,accuracy,errors:errors.length,date:new Date().toLocaleString()});localStorage.setItem('sejarahHistory',JSON.stringify(history.slice(-100)));result.innerHTML=`<div class="card"><h2>World 1 完成</h2><div class="scoreBig">${score}</div><p>正确率：${accuracy}%</p><div class="toolbar"><button onclick="startGame(0)">再次挑战</button><button class="secondary" onclick="location.reload()">返回主页</button></div></div><div class="card"><h2>错题订正簿</h2>${errors.length?errors.map((e,i)=>`<div class="reviewItem"><b>${i+1}. ${e.q}</b><br>正确答案：${e.a[e.c]}<br>华语解释：${e.cn}<br>关键词：${e.kw}</div>`).join(''):'<p>本轮没有错题。</p>'}</div>`}if(profile.name){renderMap();map.classList.remove('hide')}sync();</script></body></html>
