<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title><style>body{margin:0;font-family:Arial;background:#07111f;color:#eef4ff}.app{max-width:1000px;margin:auto;padding:24px}.card{background:#10213a;border:1px solid #29496f;border-radius:20px;padding:22px;margin:16px 0}button{padding:13px 16px;border:0;border-radius:12px;background:#f3c65d;font-weight:700;cursor:pointer}.worlds{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.world{background:#132945;border:1px solid #31547c;border-radius:16px;padding:18px}.locked{opacity:.45}.answers{display:grid;gap:10px}.answer{text-align:left;background:#17304f;color:white;border:1px solid #3c638d}.ok{background:#1f6a4e}.bad{background:#7a2f3e}.hide{display:none}.bar{height:14px;background:#07111f;border-radius:20px;overflow:hidden}.bar span{display:block;height:100%;background:#e44d68}</style></head><body><main class="app"><section class="card"><small>KSSM FORM 4 + FORM 5</small><h1>SEJARAH LEGENDS</h1><p>Battle RPG untuk fakta, kronologi, KBAT, struktur dan esei SPM.</p><button onclick="start()">Mulakan World 1</button></section><section id="map"><h2>Peta Dunia</h2><div class="worlds" id="worlds"></div></section><section id="game" class="hide"><div class="card"><h2>Penjaga Warisan</h2><div class="bar"><span id="hp" style="width:100%"></span></div><p id="hpText">HP 100 / 100</p></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div class="answers" id="answers"></div><div id="feedback" class="card hide"></div></div></section></main><script>const worlds=['Warisan Negara Bangsa','Kebangkitan Nasionalisme','Konflik Dunia','Era Peralihan Kuasa British','Persekutuan Tanah Melayu 1948','Ancaman Komunis dan Darurat','Usaha ke Arah Kemerdekaan','Pilihan Raya','Perlembagaan PTM 1957','Pemasyhuran Kemerdekaan','Kedaulatan Negara','Perlembagaan Persekutuan','Raja Berperlembagaan','Sistem Persekutuan','Pembentukan Malaysia','Cabaran Selepas Pembentukan Malaysia','Membina Kesejahteraan Negara','Membina Kemakmuran Negara','Dasar Luar Malaysia'];document.getElementById('worlds').innerHTML=worlds.map((w,i)=>`<div class="world ${i?'locked':''}"><small>WORLD ${i+1}</small><h3>${w}</h3><p>${i?'Belum dibuka':'Demo tersedia'}</p></div>`).join('');const qs=[{q:'Apakah ciri negara bangsa yang berkaitan dengan kawasan pemerintahan?',a:['Rakyat','Wilayah pengaruh','Lambang kebesaran','Undang-undang'],c:1,cn:'“Wilayah pengaruh” 指君主统治并受到承认的范围。',kw:'kawasan pemerintahan → wilayah pengaruh'},{q:'Siapakah ketua pentadbir dan ketua tentera Kesultanan Melayu Melaka?',a:['Bendahara','Temenggung','Laksamana','Syahbandar'],c:0,cn:'Bendahara 协助苏丹管理国家，也统领军队。',kw:'ketua pentadbir + ketua tentera → Bendahara'},{q:'Apakah fungsi undang-undang?',a:['Menjamin keamanan','Menentukan warna bendera','Menghapuskan rakyat','Menggantikan pemerintah'],c:0,cn:'法律用于维持秩序，并保障国家安全与人民福祉。',kw:'fungsi undang-undang → keamanan dan kesejahteraan'}];let i=0,hp=100,lock=false;function start(){map.classList.add('hide');game.classList.remove('hide');render()}function render(){lock=false;const x=qs[i%qs.length];meta.textContent=`WORLD 1 • SOALAN ${i+1}`;question.textContent=x.q;answers.innerHTML=x.a.map((v,n)=>`<button class="answer" onclick="pick(${n},this)">${String.fromCharCode(65+n)}. ${v}</button>`).join('');feedback.classList.add('hide')}function pick(n,b){if(lock)return;lock=true;const x=qs[i%qs.length];document.querySelectorAll('.answer')[x.c].classList.add('ok');if(n===x.c){hp=Math.max(0,hp-34);feedback.innerHTML='<b>Betul.</b><br>'+x.kw}else{b.classList.add('bad');feedback.innerHTML='<b>需要订正</b><br><br>华语解释：'+x.cn+'<br><br>马来文关键词：'+x.kw}feedback.classList.remove('hide');document.getElementById('hp').style.width=hp+'%';hpText.textContent=`HP ${hp} / 100`;i++;setTimeout(()=>hp<=0?win():render(),1800)}function win(){question.textContent='World 1 Demo Selesai';answers.innerHTML='';feedback.innerHTML='下一阶段：Struktur、Esei、武器、提示、学生记录与排行榜。';feedback.classList.remove('hide')}</script></body></html>
