<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼音王国 Pinyin Kingdom</title>
  <style>
    :root {
      --bg1:#fff4cc;
      --bg2:#dff7ff;
      --card:#ffffff;
      --ink:#273043;
      --accent:#ff8c42;
      --accent2:#5c7cfa;
      --good:#2f9e44;
      --bad:#e03131;
      --soft:#f1f3f5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Arial Rounded MT Bold","Microsoft YaHei",system-ui,sans-serif;
      color:var(--ink);
      background:linear-gradient(180deg,var(--bg2),var(--bg1));
      min-height:100vh;
    }
    button{font:inherit}
    .app{max-width:980px;margin:0 auto;padding:18px}
    .hero{
      display:flex;
      gap:16px;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,255,255,.9);
      border:4px solid #fff;
      border-radius:28px;
      padding:18px;
      box-shadow:0 12px 30px rgba(39,48,67,.12);
    }
    .hero h1{margin:0;font-size:clamp(28px,6vw,54px)}
    .hero p{margin:6px 0 0;font-size:18px}
    .mascot{font-size:70px;animation:bob 1.8s ease-in-out infinite}
    @keyframes bob{50%{transform:translateY(-8px)}}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
    .stat{background:white;border-radius:20px;padding:12px;text-align:center;box-shadow:0 8px 20px rgba(39,48,67,.08)}
    .stat strong{display:block;font-size:26px}
    .map{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .world{
      position:relative;
      min-height:155px;
      border:none;
      border-radius:26px;
      padding:18px;
      text-align:left;
      cursor:pointer;
      background:white;
      box-shadow:0 10px 24px rgba(39,48,67,.1);
      transition:.2s transform,.2s box-shadow;
    }
    .world:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(39,48,67,.16)}
    .world.locked{filter:grayscale(.8);opacity:.6;cursor:not-allowed}
    .world .icon{font-size:44px}
    .world h2{margin:8px 0 4px;font-size:22px}
    .world p{margin:0;font-size:15px}
    .badge{position:absolute;right:14px;top:14px;background:var(--soft);border-radius:999px;padding:6px 10px;font-size:13px}
    .game{display:none;margin-top:16px;background:white;border-radius:28px;padding:18px;box-shadow:0 12px 30px rgba(39,48,67,.12)}
    .game.active{display:block}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .back{border:none;background:var(--soft);padding:10px 14px;border-radius:14px;cursor:pointer}
    .progress{height:14px;background:#edf2f7;border-radius:999px;overflow:hidden;margin:14px 0}
    .progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#ffd43b);transition:.3s}
    .battle{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:center;margin-bottom:10px}
    .fighter,.enemy{background:#f8f9fa;border-radius:22px;padding:14px;text-align:center}
    .fighter .face,.enemy .face{font-size:56px}
    .hp{height:12px;background:#dee2e6;border-radius:999px;overflow:hidden;margin-top:8px}
    .hp span{display:block;height:100%;background:var(--good);transition:.3s}
    .enemy .hp span{background:var(--bad)}
    .question{font-size:clamp(28px,7vw,48px);text-align:center;padding:18px 8px}
    .hint{text-align:center;color:#667085;margin-bottom:12px}
    .answers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .answer{
      min-height:72px;
      border:3px solid #edf2f7;
      background:#fff;
      border-radius:20px;
      cursor:pointer;
      font-size:26px;
      transition:.15s;
    }
    .answer:hover{border-color:var(--accent2);transform:scale(1.02)}
    .answer.correct{background:#d3f9d8;border-color:var(--good)}
    .answer.wrong{background:#ffe3e3;border-color:var(--bad)}
    .feedback{min-height:58px;margin-top:12px;padding:12px;border-radius:18px;background:#f8f9fa;font-size:17px}
    .reward{display:none;text-align:center;padding:24px}
    .reward.show{display:block}
    .reward .big{font-size:80px}
    .primary{border:none;background:var(--accent2);color:white;padding:12px 18px;border-radius:16px;cursor:pointer}
    .tiny{font-size:13px;color:#667085;margin-top:14px;text-align:center}
    @media(max-width:680px){
      .map,.battle,.answers{grid-template-columns:1fr}
      .hero{align-items:flex-start}
      .mascot{font-size:54px}
      .stats{grid-template-columns:1fr 1fr 1fr}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>拼音王国</h1>
        <p>每答对一题，就帮小兔打败怪兽！</p>
      </div>
      <div class="mascot" aria-label="小兔勇士">🐰</div>
    </section>

    <section class="stats" aria-label="学习成绩">
      <div class="stat"><span>⭐ 星星</span><strong id="stars">0</strong></div>
      <div class="stat"><span>🔥 连续答对</span><strong id="combo">0</strong></div>
      <div class="stat"><span>🏆 已解锁</span><strong id="unlocked">1/6</strong></div>
    </section>

    <section id="map" class="map" aria-label="世界地图">
      <button class="world" data-world="tone">
        <span class="badge">第1关</span><div class="icon">🌈</div><h2>声调森林</h2><p>认识一声、二声、三声、四声</p>
      </button>
      <button class="world locked" data-world="initials">
        <span class="badge">🔒</span><div class="icon">⛰️</div><h2>声母峡谷</h2><p>b p m f 和更多声母</p>
      </button>
      <button class="world locked" data-world="finals">
        <span class="badge">🔒</span><div class="icon">🍬</div><h2>韵母糖果岛</h2><p>单韵母、复韵母、鼻韵母</p>
      </button>
      <button class="world locked" data-world="sandhi">
        <span class="badge">🔒</span><div class="icon">🌋</div><h2>变调火山</h2><p>一、不、上声变调</p>
      </button>
      <button class="world locked" data-world="neutral">
        <span class="badge">🔒</span><div class="icon">☁️</div><h2>轻声云朵村</h2><p>找出轻轻读的字</p>
      </button>
      <button class="world locked" data-world="erhua">
        <span class="badge">🔒</span><div class="icon">🏰</div><h2>儿化城堡</h2><p>认识“儿”的特别作用</p>
      </button>
    </section>

    <section id="game" class="game" aria-live="polite">
      <div class="topbar">
        <button class="back" id="backBtn" type="button">← 回地图</button>
        <strong id="levelTitle">声调森林</strong>
        <span id="questionNo">1 / 10</span>
      </div>
      <div class="progress"><span id="progressFill"></span></div>

      <div id="battle" class="battle">
        <div class="fighter">
          <div class="face">🐰</div>
          <strong>小兔勇士</strong>
          <div class="hp"><span id="playerHp" style="width:100%"></span></div>
        </div>
        <div class="enemy">
          <div class="face">🐲</div>
          <strong>声调龙</strong>
          <div class="hp"><span id="enemyHp" style="width:100%"></span></div>
        </div>
      </div>

      <div id="quizArea">
        <div class="question" id="question">“马 mǎ” 是第几声？</div>
        <div class="hint" id="hint">看一看拼音上面的符号。</div>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback">选一个答案吧！</div>
      </div>

      <div id="reward" class="reward">
        <div class="big">🏆</div>
        <h2>你打败声调龙了！</h2>
        <p>获得 10 颗星星，下一关已解锁。</p>
        <button class="primary" id="continueBtn" type="button">回到世界地图</button>
      </div>
    </section>

    <p class="tiny">适合7岁儿童：大按钮、短句、即时鼓励、少量文字、每关约3–5分钟。</p>
  </main>

  <script>
    const questions = [
      {q:'“妈 mā” 是第几声？', a:'第一声', choices:['第一声','第二声','第三声','第四声'], tip:'ā 是平平的一条线，所以是第一声。'},
      {q:'“麻 má” 是第几声？', a:'第二声', choices:['第一声','第二声','第三声','第四声'], tip:'á 向上扬，所以是第二声。'},
      {q:'“马 mǎ” 是第几声？', a:'第三声', choices:['第一声','第二声','第三声','第四声'], tip:'ǎ 先下再上，所以是第三声。'},
      {q:'“骂 mà” 是第几声？', a:'第四声', choices:['第一声','第二声','第三声','第四声'], tip:'à 从上往下掉，所以是第四声。'},
      {q:'“跑” 的拼音是哪一个？', a:'pǎo', choices:['pāo','páo','pǎo','pào'], tip:'“跑”读第三声：pǎo。'},
      {q:'“多” 的拼音是哪一个？', a:'duō', choices:['dūo','duō','duó','duǒ'], tip:'有 o 就把声调标在 o 上：duō。'},
      {q:'“灰” 的正确拼音是？', a:'huī', choices:['hūi','huí','huī','huǐ'], tip:'i 和 u 在一起，声调标后面：huī。'},
      {q:'“秀” 的正确拼音是？', a:'xiù', choices:['xìu','xiú','xiù','xǐu'], tip:'i 和 u 在一起，声调标后面：xiù。'},
      {q:'“女” 的拼音是？', a:'nǚ', choices:['nǔ','nǚ','nù','nū'], tip:'n 和 l 遇到 ü，两个点要保留。'},
      {q:'“雨” 的拼音是？', a:'yǔ', choices:['yǚ','yǔ','yù','yú'], tip:'y 遇到 ü，两个点要去掉，写成 yǔ。'}
    ];

    const map = document.getElementById('map');
    const game = document.getElementById('game');
    const answersEl = document.getElementById('answers');
    const feedback = document.getElementById('feedback');
    const questionEl = document.getElementById('question');
    const hintEl = document.getElementById('hint');
    const questionNo = document.getElementById('questionNo');
    const progressFill = document.getElementById('progressFill');
    const enemyHp = document.getElementById('enemyHp');
    const playerHp = document.getElementById('playerHp');
    const starsEl = document.getElementById('stars');
    const comboEl = document.getElementById('combo');
    const unlockedEl = document.getElementById('unlocked');
    const reward = document.getElementById('reward');
    const quizArea = document.getElementById('quizArea');

    let index = 0;
    let stars = 0;
    let combo = 0;
    let player = 100;
    let enemy = 100;
    let answered = false;

    function startGame(){
      index = 0; stars = 0; combo = 0; player = 100; enemy = 100; answered = false;
      map.style.display='none'; game.classList.add('active'); reward.classList.remove('show'); quizArea.style.display='block';
      updateStats(); renderQuestion();
    }

    function renderQuestion(){
      answered = false;
      const item = questions[index];
      questionEl.textContent = item.q;
      hintEl.textContent = '仔细看，再选择。';
      questionNo.textContent = `${index+1} / ${questions.length}`;
      progressFill.style.width = `${(index/questions.length)*100}%`;
      answersEl.innerHTML='';
      item.choices.forEach(choice=>{
        const btn=document.createElement('button');
        btn.type='button'; btn.className='answer'; btn.textContent=choice;
        btn.addEventListener('click',()=>checkAnswer(btn,choice,item));
        answersEl.appendChild(btn);
      });
      feedback.textContent='选一个答案吧！';
    }

    function checkAnswer(btn,choice,item){
      if(answered) return;
      answered=true;
      const all=[...document.querySelectorAll('.answer')];
      if(choice===item.a){
        btn.classList.add('correct');
        combo++; stars++;
        enemy=Math.max(0,enemy-10);
        feedback.textContent=`答对了！${item.tip}`;
      }else{
        btn.classList.add('wrong');
        combo=0;
        player=Math.max(0,player-10);
        const correctBtn=all.find(b=>b.textContent===item.a);
        if(correctBtn) correctBtn.classList.add('correct');
        feedback.textContent=`差一点。正确答案是“${item.a}”。${item.tip}`;
      }
      updateStats();
      setTimeout(()=>{
        index++;
        if(index>=questions.length){ finishGame(); }
        else renderQuestion();
      },1400);
    }

    function updateStats(){
      starsEl.textContent=stars;
      comboEl.textContent=combo;
      enemyHp.style.width=`${enemy}%`;
      playerHp.style.width=`${player}%`;
    }

    function finishGame(){
      progressFill.style.width='100%';
      quizArea.style.display='none';
      reward.classList.add('show');
      const next=document.querySelector('[data-world="initials"]');
      next.classList.remove('locked');
      next.querySelector('.badge').textContent='新关卡';
      unlockedEl.textContent='2/6';
    }

    document.querySelector('[data-world="tone"]').addEventListener('click',startGame);
    document.querySelectorAll('.world.locked').forEach(btn=>btn.addEventListener('click',()=>{
      const badge=btn.querySelector('.badge');
      badge.textContent='先完成第1关';
      setTimeout(()=>badge.textContent='🔒',1200);
    }));
    document.getElementById('backBtn').addEventListener('click',()=>{
      game.classList.remove('active'); map.style.display='grid';
    });
    document.getElementById('continueBtn').addEventListener('click',()=>{
      game.classList.remove('active'); map.style.display='grid';
    });
  </script>
</body>
</html>
