<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World 10 拼音大师试炼</title><style>body{margin:0;font-family:system-ui,"Microsoft YaHei";background:linear-gradient(#efe5ff,#fff4cc);color:#273043}.app{max-width:850px;margin:auto;padding:18px}.card{background:white;border-radius:24px;padding:18px;margin:14px 0;box-shadow:0 10px 25px #0001}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.btn,.ans{border:0;border-radius:18px;padding:15px;font:inherit;cursor:pointer}.btn{background:#7950f2;color:white;text-decoration:none}.q{text-align:center;font-size:32px;margin:24px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ans{background:#f1f3f5;font-size:22px}.ok{background:#d3f9d8}.bad{background:#ffe3e3}.msg{text-align:center;min-height:34px}@media(max-width:600px){.answers{grid-template-columns:1fr}}</style></head><body><main class="app"><section class="card"><div class="top"><a class="btn" href="index.html">← 世界地图</a><strong id="round">1/24</strong><strong>⭐ <span id="score">0</span></strong></div><h1 style="text-align:center">⚡ World 10：拼音大师试炼</h1><p style="text-align:center">混合声调、标调、声母、韵母、鼻音、变调、轻声与儿化。</p></section><section class="card" id="game"><div class="q" id="q"></div><div class="answers" id="answers"></div><p class="msg" id="msg">准备挑战！</p></section></main><script>const qs=[['“马 mǎ”是第几声？','第三声',['第一声','第二声','第三声','第四声']],['“灰”的正确拼音？','huī',['hūi','huī','huí','huǐ']],['哪一个是声母？','zh',['ai','zh','ang','ü']],['哪一个是复韵母？','ai',['a','ai','an','ang']],['哪一个是前鼻音？','an',['an','ang','ao','ai']],['哪一个是后鼻音？','ing',['in','ing','ie','iu']],['“不是”的“不”怎么读？','bú',['bū','bú','bǔ','bù']],['“很好”前一个第三声变成？','第二声',['第一声','第二声','第三声','第四声']],['“妈妈”第二个“妈”读？','轻声',['第一声','第二声','第三声','轻声']],['“小孩儿”的“儿”表示？','亲切喜爱',['地点','数量','亲切喜爱','时间']],['j遇ü怎样写？','去掉两点',['保留两点','去掉两点','改成u声母','不拼']],['n遇ü怎样写？','保留两点',['保留两点','去掉两点','改成i','不标调']],['“跑”的正确拼音？','pǎo',['pāo','páo','pǎo','pào']],['“秀”的正确拼音？','xiù',['xìu','xiù','xiú','xǐu']],['哪一个是平舌音？','z',['zh','ch','sh','z']],['哪一个是翘舌音？','sh',['z','c','s','sh']],['哪一个是单韵母？','ü',['ai','ang','ü','er']],['哪一个是特别韵母？','er',['er','ai','an','ang']],['“花啊”里的“啊”常读？','呀',['呀','哇','哪','啦']],['“天啊”里的“啊”常读？','哪',['呀','哇','哪','啦']],['轻声要不要标调号？','不标',['标一声','标二声','标三声','不标']],['“头儿”可用来？','区别词义',['表示过去','区别词义','表示数量','表示方向']],['i和u并列，声调标哪里？','后面',['前面','后面','两个都标','不标']],['有a时声调标哪里？','a上',['a上','o上','e上','最后一个字母']]];let order=[...qs].sort(()=>Math.random()-.5),i=0,s=0,lock=false;function render(){lock=false;const x=order[i];round.textContent=(i+1)+'/'+order.length;q.textContent=x[0];answers.innerHTML='';[...x[2]].sort(()=>Math.random()-.5).forEach(c=>{const b=document.createElement('button');b.className='ans';b.textContent=c;b.onclick=()=>check(b,c,x[1]);answers.appendChild(b)});msg.textContent='看清楚再选择。'}function check(b,c,a){if(lock)return;lock=true;if(c===a){b.classList.add('ok');s++;msg.textContent='答对了！'}else{b.classList.add('bad');[...document.querySelectorAll('.ans')].find(x=>x.textContent===a).classList.add('ok');msg.textContent='正确答案：'+a}score.textContent=s;setTimeout(()=>{i++;if(i===order.length){localStorage.setItem('pinyin_world10','done');game.innerHTML='<h1 style="text-align:center">🏆 拼音大师试炼完成</h1><p style="text-align:center">答对 '+s+' / '+order.length+' 题</p><p style="text-align:center"><a class="btn" href="world11.html">进入 World 11 →</a></p>'}else render()},900)}render();</script></body></html>
