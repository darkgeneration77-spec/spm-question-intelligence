<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World 1 声调森林</title><style>body{margin:0;font-family:system-ui,"Microsoft YaHei";background:linear-gradient(#dff7ff,#fff4cc);color:#273043}.app{max-width:820px;margin:auto;padding:18px}.card{background:#fff;border-radius:24px;padding:18px;margin:14px 0;box-shadow:0 10px 25px #0001}h1{text-align:center}.q{font-size:34px;text-align:center;margin:22px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}button,a{font:inherit}.ans,.btn{border:0;border-radius:18px;padding:16px;cursor:pointer}.ans{background:#f1f3f5;font-size:24px}.ok{background:#d3f9d8}.bad{background:#ffe3e3}.btn{background:#5c7cfa;color:#fff;text-decoration:none;display:inline-block}.msg{text-align:center;min-height:32px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}@media(max-width:600px){.answers{grid-template-columns:1fr}}</style></head><body><main class="app"><div class="card"><div class="top"><a class="btn" href="index.html">← 世界地图</a><strong id="round">1/12</strong><strong>⭐ <span id="score">0</span></strong></div><h1>🌳 World 1：声调森林</h1><p style="text-align:center">认识第一声、第二声、第三声、第四声。</p></div><div class="card"><div class="q" id="q"></div><div class="answers" id="answers"></div><p class="msg" id="msg">选出正确答案。</p></div></main><script>const qs=[['妈 mā 是第几声？','第一声'],['麻 má 是第几声？','第二声'],['马 mǎ 是第几声？','第三声'],['骂 mà 是第几声？','第四声'],['ā 是第几声？','第一声'],['á 是第几声？','第二声'],['ǎ 是第几声？','第三声'],['à 是第几声？','第四声'],['跑 pǎo 是第几声？','第三声'],['多 duō 是第几声？','第一声'],['女 nǚ 是第几声？','第三声'],['雨 yǔ 是第几声？','第三声']];const choices=['第一声','第二声','第三声','第四声'];let i=0,s=0,lock=false;function render(){lock=false;document.getElementById('round').textContent=(i+1)+'/'+qs.length;document.getElementById('q').textContent=qs[i][0];const box=document.getElementById('answers');box.innerHTML='';choices.forEach(c=>{const b=document.createElement('button');b.className='ans';b.textContent=c;b.onclick=()=>check(b,c);box.appendChild(b)});document.getElementById('msg').textContent='选出正确答案。'}function check(b,c){if(lock)return;lock=true;const a=qs[i][1];if(c===a){b.classList.add('ok');s++;document.getElementById('msg').textContent='答对了！'}else{b.classList.add('bad');[...document.querySelectorAll('.ans')].find(x=>x.textContent===a).classList.add('ok');document.getElementById('msg').textContent='正确答案是：'+a}document.getElementById('score').textContent=s;setTimeout(()=>{i++;if(i===qs.length){localStorage.setItem('pinyin_world1','done');document.querySelector('.card:last-child').innerHTML='<h1>🏆 声调森林完成！</h1><p style="text-align:center">答对 '+s+' / '+qs.length+' 题</p><p style="text-align:center"><a class="btn" href="world2.html">进入 World 2 →</a></p>'}else render()},900)}render();</script></body></html>
