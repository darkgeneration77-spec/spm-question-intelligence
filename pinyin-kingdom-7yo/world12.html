<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World 12 拼音神殿</title><style>body{margin:0;font-family:system-ui,"Microsoft YaHei";background:linear-gradient(#201547,#6f42c1,#fff4cc);color:#273043}.app{max-width:860px;margin:auto;padding:18px}.card{background:#fff;border-radius:26px;padding:20px;margin:16px 0;box-shadow:0 12px 30px #0003}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.btn,.ans{border:0;border-radius:18px;padding:15px;font:inherit;cursor:pointer}.btn{background:#7048e8;color:white;text-decoration:none}.q{text-align:center;font-size:34px;margin:24px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ans{background:#f1f3f5;font-size:22px}.ok{background:#d3f9d8}.bad{background:#ffe3e3}.msg{text-align:center;min-height:34px}@media(max-width:600px){.answers{grid-template-columns:1fr}}</style></head><body><main class="app"><section class="card"><div class="top"><a class="btn" href="index.html">← 世界地图</a><strong id="round">1/30</strong><strong>👑 <span id="score">0</span></strong></div><h1 style="text-align:center">🌟 World 12：拼音神殿</h1><p style="text-align:center">完成最终试炼，获得“拼音大师”称号。</p></section><section class="card" id="game"><div class="q" id="q"></div><div class="answers" id="answers"></div><p class="msg" id="msg">最终挑战开始！</p></section></main><script>const base=[['mā是第几声？','第一声',['第一声','第二声','第三声','第四声']],['mǎ是第几声？','第三声',['第一声','第二声','第三声','第四声']],['灰的正确拼音？','huī',['hūi','huī','huí','huǐ']],['女的正确拼音？','nǚ',['nǔ','nǚ','nù','nū']],['哪一个是声母？','q',['q','ai','an','ü']],['哪一个是复韵母？','ou',['o','ou','ong','er']],['哪一个是前鼻音？','en',['en','eng','ei','er']],['哪一个是后鼻音？','ang',['an','ang','ai','ao']],['“不是”的“不”读？','bú',['bū','bú','bǔ','bù']],['两个第三声连读，前一个变？','第二声',['第一声','第二声','第三声','第四声']],['“妈妈”第二个“妈”读？','轻声',['第一声','第二声','第三声','轻声']],['儿化韵常加什么字母？','r',['n','g','r','y']],['j遇ü怎样写？','去两点',['留两点','去两点','改成i','不拼']],['n遇ü怎样写？','留两点',['留两点','去两点','改成u','不拼']],['有a时声调标哪里？','a上',['a上','o上','e上','最后']],['i和u并列标哪里？','后面',['前面','后面','两个','不标']],['哪一个是翘舌音？','ch',['z','c','s','ch']],['哪一个是平舌音？','s',['zh','ch','sh','s']],['哪一个是特别韵母？','er',['er','ai','an','ang']],['轻声标不标调号？','不标',['标一声','标二声','标三声','不标']],['花啊常读成？','花呀',['花呀','花哇','花哪','花啦']],['好啊常读成？','好哇',['好呀','好哇','好哪','好啦']],['头儿可用来？','区别词义',['表示数量','区别词义','表示时间','表示地点']],['小孩儿带有什么感情色彩？','亲切喜爱',['生气','害怕','亲切喜爱','命令']],['b+a拼成？','ba',['ab','ba','pa','ma']],['zh+uang拼成？','zhuang',['zhang','zhuang','chuang','shuang']],['哪一个是单韵母？','e',['ei','en','e','er']],['哪一个是后鼻音？','iong',['in','ian','iong','iu']],['“秀”正确拼音？','xiù',['xìu','xiù','xiú','xǐu']],['“雨”正确拼音？','yǔ',['yǚ','yǔ','yù','yú']]];let order=[...base].sort(()=>Math.random()-.5),i=0,s=0,lock=false;function render(){lock=false;const x=order[i];round.textContent=(i+1)+'/'+order.length;q.textContent=x[0];answers.innerHTML='';[...x[2]].sort(()=>Math.random()-.5).forEach(c=>{const b=document.createElement('button');b.className='ans';b.textContent=c;b.onclick=()=>check(b,c,x[1]);answers.appendChild(b)});msg.textContent='看清楚，再选择。'}function check(b,c,a){if(lock)return;lock=true;if(c===a){b.classList.add('ok');s++;msg.textContent='答对了！'}else{b.classList.add('bad');[...document.querySelectorAll('.ans')].find(x=>x.textContent===a).classList.add('ok');msg.textContent='正确答案：'+a}score.textContent=s;setTimeout(()=>{i++;if(i===order.length){localStorage.setItem('pinyin_world12','done');game.innerHTML='<h1 style="text-align:center">🎓 你毕业了！</h1><p style="text-align:center">答对 '+s+' / '+order.length+' 题</p><h2 style="text-align:center">👑 拼音大师</h2><p style="text-align:center"><a class="btn" href="index.html">回到世界地图</a></p>'}else render()},850)}render();</script></body></html>
