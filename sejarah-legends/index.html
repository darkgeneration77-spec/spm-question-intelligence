<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title><style>:root{--bg:#07111f;--p:#10213a;--p2:#132945;--line:#31547c;--gold:#f3c65d;--green:#2b936c;--red:#a43d50}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#17345b,#07111f 48%);color:#eef4ff;min-height:100vh}.app{max-width:1120px;margin:auto;padding:16px}.card{background:#10213af5;border:1px solid #29496f;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 14px 38px #0005}button,input{padding:13px 16px;border:0;border-radius:12px;font-weight:800}button{background:var(--gold);cursor:pointer}button:disabled{opacity:.35}input{width:100%;background:#09192c;color:#fff;border:1px solid var(--line);margin:8px 0}.top,.toolbar,.stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.top{justify-content:space-between}.pill{background:#0b1a2e;border:1px solid var(--line);border-radius:999px;padding:8px 12px}.hide{display:none!important}.worlds,.characters,.essayGrid,.badgeGrid,.routeGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.world,.character,.essayCard,.badge,.route{background:var(--p2);border:1px solid var(--line);border-radius:16px;padding:17px}.world.open,.character.selected,.essayCard.selected{border-color:var(--gold)}.locked{opacity:.4}.avatar{font-size:52px;text-align:center}.arena{position:relative;min-height:230px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:end;background:linear-gradient(#1a3151,#0b1728);border-radius:18px;padding:25px}.fighter{text-align:center}.sprite{font-size:78px;display:block}.enemySprite{animation:float 2s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}.attack{animation:attack .45s}@keyframes attack{50%{transform:translateX(55px) scale(1.12)}}.hit{animation:hit .45s}@keyframes hit{25%{transform:translateX(-12px)}50%{transform:translateX(12px)}}.taunt{position:absolute;top:12px;right:18px;background:#7a2f3e;padding:9px 13px;border-radius:14px;max-width:55%}.bar{height:15px;background:#07111f;border-radius:20px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#e44d68,#ff8c62);transition:.4s}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer,.builderOption{text-align:left;background:#17304f;color:#fff;border:1px solid #3c638d}.answer.ok{background:var(--green)}.answer.bad{background:var(--red)}.correctBox{border-left:5px solid var(--green)}.wrongBox{border-left:5px solid var(--red)}.secondary{background:#25496f;color:#fff}.hint{background:#6b59bb;color:#fff}.reviewItem{background:#0b1a2e;border:1px solid #29496f;border-radius:14px;padding:14px;margin:10px 0}.builderOption{display:block;width:100%;margin:8px 0}.builderSlot{min-height:50px;border:2px dashed #50759e;border-radius:12px;padding:12px;margin:9px 0}.scoreBig{font-size:52px;font-weight:900;color:var(--gold)}.timerLow{background:#7a2f3e!important}.badge strong,.route strong{color:var(--gold)}@media(max-width:680px){.answers{grid-template-columns:1fr}.arena{min-height:190px;padding:15px}.sprite{font-size:58px}.app{padding:9px}.card{padding:15px}}</style></head><body><main class="app"><section class="card top"><div><small>KSSM FORM 4 + FORM 5</small><h1>SEJARAH LEGENDS</h1><div>Battle RPG • 华语订正 • Paper 2 Builder</div></div><div class="stats"><span class="pill">玩家 <b id="playerTop">-</b></span><span class="pill">分数 <b id="scoreTop">0</b></span><span class="pill">Combo <b id="comboTop">0</b></span><span class="pill">Hints <b id="hintTop">3</b></span><span id="timerPill" class="pill">时间 <b id="timerTop">20</b>s</span></div></section><section id="home"><div class="card"><h2>学生档案</h2><input id="studentName" placeholder="输入学生名字"><h3>选择角色</h3><div id="characters" class="characters"></div><div class="toolbar"><button onclick="saveProfile()">保存并进入地图</button><button class="secondary" onclick="showSaved()">教师成绩面板</button></div></div><div id="map" class="card hide"><h2>世界地图</h2><div id="worlds" class="worlds"></div><div class="card"><h3>复习路线</h3><div id="revisionRoute" class="routeGrid"></div></div><div class="card"><h3>已获得徽章</h3><div id="badges" class="badgeGrid"></div></div></div><div id="saved" class="card hide"></div></section><section id="game" class="hide"><div class="card arena"><div id="taunt" class="taunt">历史不是背诵，是战斗。</div><div class="fighter"><span id="heroSprite" class="sprite">⚔️</span><b id="heroName">Hero</b></div><div class="fighter"><span id="enemySprite" class="sprite enemySprite">♜</span><b id="enemyName">Penjaga</b><div class="bar"><span id="hpBar" style="width:100%"></span></div><small id="hpText">HP 100 / 100</small></div></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div id="answers" class="answers"></div><div class="toolbar"><button id="hintBtn" class="hint" onclick="useHint()">神秘人 Hint</button><button id="nextBtn" class="secondary hide" onclick="nextQuestion()">下一题</button></div><div id="feedback" class="card hide"></div></div></section><section id="builder" class="hide"><div class="card"><small>PAPER 2 • STRUKTUR BUILDER</small><h2 id="builderTitle"></h2><p id="builderQuestion"></p><div id="slots"></div><div id="builderOptions"></div><button onclick="checkBuilder()">检查答案</button><div id="builderFeedback" class="card hide"></div></div></section><section id="essay" class="hide"><div class="card"><small>PAPER 2 • ESEI BUILDER</small><h2 id="essayTitle"></h2><p id="essayQuestion"></p><div id="essaySlots"></div><div id="essayOptions" class="essayGrid"></div><button onclick="checkEssay()">形成 SPM Esei</button><div id="essayFeedback" class="card hide"></div></div></section><section id="result" class="hide"></section></main><script>const $=id=>document.getElementById(id),worldNames=['Warisan Negara Bangsa','Kebangkitan Nasionalisme','Konflik Dunia','Era Peralihan Kuasa British','Persekutuan Tanah Melayu 1948',' asa mutlak asing','Sistem cukai'],0,'民族主义是热爱民族与国家，并争取自由与主权。','nasionalisme → cinta bangsa dan negara'),Q('Revolusi Keagungan berlaku di negara mana?',['England','Perancis','India','China'],0,'Revolusi Keagungan 发生在 England。','Revolusi Keagungan → England'),Q('Tokoh nasionalisme Filipina ialah...',['Jose Rizal','Mahatma Gandhi','Sun Yat Sen','Soekarno'],0,'Jose Rizal 推动菲律宾民族觉醒。','Filipina → Jose Rizal'),Q('Apakah peranan akhbar dalam nasionalisme?',['Menyebarkan idea perjuangan','Menutup sekolah','Membantu penjajah','Menghapus bahasa'],0,'报章传播改革与民族主义思想。','akhbar → sebar idea perjuangan')],'Jelaskan dua faktor kemunculan nasionalisme. [4 markah]',['Media cetak menyebarkan idea pembaharuan dan perjuangan.','Sistem pendidikan melahirkan golongan intelektual.'],'Huraikan kepentingan nasionalisme. [8 markah]',['Nasionalisme menyatukan rakyat.','Rakyat terdorong menolak penjajahan.','Rakyat sanggup berkorban demi negara.','Kesannya, kedaulatan negara dipelihara.']),W('Panglima Dunia','🛡️',[Q('Apakah faktor utama Perang Dunia Pertama?',['Persaingan kuasa imperialis','Kemajuan pendidikan','Pilihan raya','Perdagangan tempatan'],0,'列强竞争、军备与联盟对立引发战争。','Perang Dunia Pertama → persaingan imperialis'),Q('Pakatan Bertiga terdiri daripada...',['Britain, Perancis dan Rusia','Jerman, Itali dan Jepun','China, India dan Siam','Portugal, Sepanyol dan Belanda'],0,'三国协约由英国、法国和俄国组成。','Pakatan Bertiga → Britain + Perancis + Rusia'),Q('Jerman menyerang negara mana pada 1939?',['Poland','China','India','Mesir'],0,'1939年德国入侵波兰。','1939 → Jerman serang Poland'),Q('Tujuan Jepun menguasai Asia Tenggara?',['Mendapatkan bahan mentah','Membina sekolah','Menghapus perdagangan','Pilihan raya'],0,'日本需要原料支持战争。','Jepun → bahan mentah')],'Jelaskan dua kesan pendudukan Jepun. [4 markah]',['Rakyat mengalami kekurangan makanan dan inflasi.','Kesedaran politik dan semangat anti-penjajah meningkat.'],'Huraikan iktibar konflik dunia. [8 markah]',['Utamakan rundingan.','Kukuhkan hubungan diplomatik.','Rakyat mesti bersatu menjaga keamanan.','Kemusnahan nyawa dan harta dapat dielakkan.']),W('Gabenor Malayan Union','🎩',[Q('Siapakah memperkenalkan Malayan Union?',['British','Jepun','Belanda','Siam'],0,'Malayan Union 是英国计划。','Malayan Union → British'),Q('Bilakah Malayan Union dilaksanakan?',['1 April 1946','31 Ogos 1957','16 September 1963','1 Februari 1948'],0,'正式实施于1946年4月1日。','Malayan Union → 1 April 1946'),Q('Mengapakah orang Melayu menentangnya?',['Kuasa Raja-raja Melayu terhakis','Cukai dihapuskan','Sekolah ditutup','Perdagangan berkembang'],0,'马来统治者权力被削弱。','tentangan → kuasa Raja-raja terhakis'),Q('Pertubuhan yang memimpin tentangan?',['UMNO','MCA','MIC','PKM'],0,'UMNO 领导反对运动。','tentangan → UMNO')],'Jelaskan dua sebab tentangan Malayan Union. [4 markah]',['Kuasa Raja-raja Melayu terhakis.','Syarat kewarganegaraan terlalu longgar.'],'Huraikan kepentingan tentangan Malayan Union. [8 markah]',['Orang Melayu bersatu.','Kedudukan Raja-raja dipulihkan.','Malayan Union diganti PTM 1948.','Perjuangan politik menjadi tersusun.']),W('Penjaga Persekutuan 1948','🏛️',[Q('Bilakah PTM 1948 ditubuhkan?',['1 Februari 1948','1 April 1946','31 Ogos 1957','16 September 1963'],0,'PTM 1948 成立于1948年2月1日。','PTM 1948 → 1 Februari 1948'),Q('Bentuk pentadbiran PTM 1948?',['Persekutuan','Kesatuan','Republik','Empayar'],0,'采用联邦制度。','PTM 1948 → Persekutuan'),Q('Kedudukan Raja-raja Melayu?',['Dikembalikan','Dihapuskan','Digantikan Gabenor','Diserah kepada pedagang'],0,'恢复马来统治者地位。','Raja-raja → dikembalikan'),Q('Kewarganegaraan diberikan melalui...',['Kuat kuasa undang-undang','Semua pedagang','Tentera Jepun','Pegawai Belanda'],0,'公民权依法律条件决定。','kewarganegaraan → kuat kuasa undang-undang')],'Jelaskan dua ciri PTM 1948. [4 markah]',['Sebelas negeri membentuk sebuah persekutuan.','Kedudukan Raja-raja Melayu dikembalikan.'],'Huraikan kepentingan PTM 1948. [8 markah]',['Kedudukan Raja-raja dipulihkan.','Negeri mengekalkan kuasa tertentu.','Kedudukan istimewa orang Melayu diiktiraf.','Asas pemerintahan sendiri dibentuk.']),W('Komander Darurat','☭',[Q('Bilakah darurat diisytiharkan di Tanah Melayu?',['1948','1946','1957','1963'],0,'紧急状态于1948年宣布。','Darurat → 1948'),Q('Apakah tujuan utama PKM?',['Menubuhkan Republik Komunis','Menyokong British','Mengadakan pilihan raya','Mengukuhkan Raja-raja'],0,'马共目标是建立共产主义共和国。','PKM → Republik Komunis'),Q('Apakah rancangan memindahkan penduduk ke kawasan terkawal?',['Rancangan Briggs','Rancangan Malaya','Sistem Ahli','Pakatan Murni'],0,'Briggs Plan 将居民迁入受控新村。','Rancangan Briggs → kampung baru'),Q('Apakah usaha memenangi hati dan fikiran rakyat?',['Perang Saraf','Perang Dunia','Gerakan Islah','Malayan Union'],0,'心理战用于争取人民支持并孤立共产党。','Perang Saraf → hati dan fikiran rakyat')],'Jelaskan dua langkah menangani ancaman komunis. [4 markah]',['Rancangan Briggs dilaksanakan untuk memutuskan bekalan kepada komunis.','Perang Saraf dijalankan untuk mendapatkan sokongan rakyat.'],'Huraikan kepentingan membanteras ancaman komunis. [8 markah]',['Keselamatan rakyat dapat dipulihkan.','Kegiatan ekonomi dapat dijalankan dengan lebih stabil.','Kedaulatan negara dapat dipertahankan.','Kesannya, proses menuju kemerdekaan dapat diteruskan.'])];let profile=JSON.parse(localStorage.getItem('sejarahProfile')||'null')||{name:'',char:0,unlocked:1,badges:[]};profile.badges=profile.badges||[];let selectedChar=profile.char||0,world=0,questions=[],index=0,enemyHp=100,score=0,combo=0,hints=3,locked=false,errors=[],timeLeft=20,timer=null,advanceTimer=null,selected=[],essaySelected=[];function setView(id){['home','game','builder','essay','result'].forEach(x=>$(x).classList.add('hide'));$(id).classList.remove('hide')}function sync(){$('playerTop').textContent=profile.name||'-';$('scoreTop').textContent=score;$('comboTop').textContent=combo;$('hintTop').textContent=hints;$('timerTop').textContent=timeLeft;$('timerPill').classList.toggle('timerLow',timeLeft<=5);$('hintBtn').disabled=hints<=0}$('characters').innerHTML=chars.map((c,i)=>`<button class="character ${i===selectedChar?'selected':''}" onclick="selectChar(${i})"><div class="avatar">${c.s}</div><h3>${c.n}</h3></button>`).join('');$('studentName').value=profile.name||'';function selectChar(i){selectedChar=i;document.querySelectorAll('.character').forEach((e,n)=>e.classList.toggle('selected',n===i))}function saveProfile(){profile={...profile,name:$('studentName').value.trim()||'Pelajar',char:selectedChar,unlocked:profile.unlocked||1};localStorage.setItem('sejarahProfile',JSON.stringify(profile));renderMap();$('map').classList.remove('hide');$('saved').classList.add('hide');sync()}function renderMap(){const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');$('worlds').innerHTML=worldNames.map((w,i)=>{const open=i<profile.unlocked;return `<div class="world ${open?'open':'locked'}"><small>WORLD ${i+1}</small><h3>${w}</h3><p>${open?(i<data.length?'已开放':'即将制作'):'完成前一世界后解锁'}</p>${open&&i<data.length?`<button onclick="startGame(${i})">进入 World ${i+1}</button>`:''}</div>`}).join('');$('badges').innerHTML=profile.badges.length?profile.badges.map(x=>`<div class="badge"><strong>${x}</strong></div>`).join(''):'<p>完成 World 后获得徽章。</p>';$('revisionRoute').innerHTML=h.length?h.slice(-6).reverse().map(x=>`<div class="route"><strong>World ${x.world}</strong><p>正确率 ${x.accuracy}%</p><button onclick="startGame(${x.world-1})">重新挑战</button></div>`).join(''):'<p>完成 World 后自动生成复习路线。</p>'}function showSaved(){$('map').classList.add('hide');$('saved').classList.remove('hide');const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');$('saved').innerHTML='<h2>教师成绩面板</h2>'+(h.length?h.slice().reverse().map(x=>`<div class="reviewItem"><b>${x.name}</b>｜World ${x.world}｜${x.score}分｜${x.accuracy}%｜错题 ${x.errors}</div>`).join(''):'<p>尚无成绩。</p>')}function startGame(w){clearInterval(timer);clearTimeout(advanceTimer);world=w;questions=data[w].qs;index=0;enemyHp=100;score=0;combo=0;hints=3;errors=[];$('heroSprite').textContent=chars[profile.char||0].s;$('heroName').textContent=profile.name||'Pelajar';$('enemySprite').textContent=data[w].icon;$('enemyName').textContent=data[w].enemy;$('hpBar').style.width='100%';$('hpText').textContent='HP 100 / 100';setView('game');renderQuestion()}function renderQuestion(){clearInterval(timer);clearTimeout(advanceTimer);locked=false;$('nextBtn').classList.add('hide');$('feedback').className='card hide';const x=questions[index];$('meta').textContent=`WORLD ${world+1} • SOALAN ${index+1}/${questions.length}`;$('question').textContent=x.q;$('answers').innerHTML=x.a.map((v,n)=>`<button class="answer" data-n="${n}" onclick="pick(${n},this)">${String.fromCharCode(65+n)}. ${v}</button>`).join('');$('taunt').textContent=index>=questions.length/2?'你的分数追得上我吗？':'历史不是背诵，是战斗。';timeLeft=20;sync();timer=setInterval(()=>{timeLeft--;sync();if(timeLeft<=0){clearInterval(timer);handleTimeout()}},1000)}function lockAnswers(){document.querySelectorAll('.answer').forEach(b=>b.disabled=true)}function pick(n,btn){if(locked)return;locked=true;clearInterval(timer);const x=questions[index],bs=[...document.querySelectorAll('.answer')];lockAnswers();bs[x.c].classList.add('ok');if(n===x.c){combo++;score+=100+combo*20;enemyHp=Math.max(0,enemyHp-Math.ceil(100/questions.length));$('heroSprite').classList.add('attack');$('enemySprite').classList.add('hit');$('feedback').className='card correctBox';$('feedback').innerHTML=`<b>正确！</b><br>Combo × ${combo}<br><b>关键词：</b>${x.kw}`}else{combo=0;btn.classList.add('bad');errors.push({...x,chosen:n});$('feedback').className='card wrongBox';$('feedback').innerHTML=`<b>需要订正</b><br><b>华语解释：</b>${x.cn}<br><b>正确答案：</b>${x.a[x.c]}<br><b>关键词：</b>${x.kw}`}$('feedback').classList.remove('hide');$('hpBar').style.width=enemyHp+'%';$('hpText').textContent=`HP ${enemyHp} / 100`;$('nextBtn').classList.remove('hide');sync();setTimeout(()=>{$('heroSprite').classList.remove('attack');$('enemySprite').classList.remove('hit')},500);advanceTimer=setTimeout(nextQuestion,2200)}function handleTimeout(){if(locked)return;locked=true;const x=questions[index],bs=[...document.querySelectorAll('.answer')];lockAnswers();bs[x.c].classList.add('ok');combo=0;errors.push({...x,chosen:-1});$('feedback').className='card wrongBox';$('feedback').innerHTML=`<b>时间到</b><br><b>正确答案：</b>${x.a[x.c]}<br><b>华语解释：</b>${x.cn}<br><b>关键词：</b>${x.kw}`;$('feedback').classList.remove('hide');$('nextBtn').classList.remove('hide');advanceTimer=setTimeout(nextQuestion,2200)}function nextQuestion(){if(!locked)return;clearTimeout(advanceTimer);index++;index>=questions.length?startBuilder():renderQuestion()}function useHint(){if(locked||hints<=0)return;hints--;const x=questions[index];[0,1,2,3].filter(n=>n!==x.c).sort(()=>Math.random()-.5).slice(0,2).forEach(n=>{const b=document.querySelector(`[data-n="${n}"]`);if(b)b.disabled=true});$('feedback').className='card';$('feedback').innerHTML='<b>神秘人出现：</b>已排除两个错误答案。';$('feedback').classList.remove('hide');sync()}function startBuilder(){clearInterval(timer);setView('builder');selected=[];$('builderTitle').textContent=`World ${world+1} Struktur Challenge`;$('builderQuestion').textContent=data[world].bq;$('builderFeedback').className='card hide';renderBuilder()}function renderBuilder(){$('slots').innerHTML=[0,1].map(i=>`<div class="builderSlot">${selected[i]||`Isi ${i+1}：点击答案`}</div>`).join('');$('builderOptions').innerHTML=[...data[world].ba,'Jawapan tidak berkaitan.','Fakta bercanggah.'].map(v=>`<button class="builderOption" onclick='chooseBuilder(${JSON.stringify(v)})'>${v}</button>`).join('')}function chooseBuilder(v){if(!selected.includes(v)&&selected.length<2){selected.push(v);renderBuilder()}}function checkBuilder(){const ok=data[world].ba.every(v=>selected.includes(v));$('builderFeedback').classList.remove('hide');if(ok){score+=400;$('builderFeedback').className='card correctBox';$('builderFeedback').innerHTML='<b>Struktur：4/4 分</b>';setTimeout(startEssay,900)}else{$('builderFeedback').className='card wrongBox';$('builderFeedback').innerHTML='<b>答案不完整，请重新选择。</b>';selected=[];renderBuilder()}sync()}function startEssay(){setView('essay');essaySelected=[];$('essayTitle').textContent=`World ${world+1} Esei Challenge`;$('essayQuestion').textContent=data[world].eq;$('essayFeedback').className='card hide';renderEssay()}function renderEssay(){$('essaySlots').innerHTML=['Isi 1','Huraian','Isi 2','Penegasan'].map((x,i)=>`<div class="builderSlot"><b>${x}</b><br>${essaySelected[i]||'尚未选择'}</div>`).join('');$('essayOptions').innerHTML=[...data[world].ea,'Jawapan tidak berkaitan.','Fakta terlalu umum.'].map(v=>`<button class="essayCard ${essaySelected.includes(v)?'selected':''}" onclick='chooseEssay(${JSON.stringify(v)})'>${v}</button>`).join('')}function chooseEssay(v){if(!essaySelected.includes(v)&&essaySelected.length<4){essaySelected.push(v);renderEssay()}}function checkEssay(){const ok=data[world].ea.every(v=>essaySelected.includes(v));$('essayFeedback').classList.remove('hide');if(ok){score+=800;$('essayFeedback').className='card correctBox';$('essayFeedback').innerHTML='<b>Esei：8/8 分</b>';setTimeout(showResult,1000)}else{$('essayFeedback').className='card wrongBox';$('essayFeedback').innerHTML='<b>Esei belum lengkap.</b>';essaySelected=[];renderEssay()}sync()}function showResult(){setView('result');const correct=questions.length-errors.length,accuracy=Math.round(correct/questions.length*100);if(profile.unlocked<world+2&&world<data.length-1)profile.unlocked=world+2;const badge=`World ${world+1} Conqueror`;if(!profile.badges.includes(badge))profile.badges.push(badge);localStorage.setItem('sejarahProfile',JSON.stringify(profile));const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');h.push({name:profile.name,world:world+1,score,accuracy,errors:errors.length,date:new Date().toLocaleString()});localStorage.setItem('sejarahHistory',JSON.stringify(h.slice(-100)));const next=world<data.length-1?`<button onclick="startGame(${world+1})">进入 World ${world+2}</button>`:'';$('result').innerHTML=`<div class="card"><small>WORLD ${world+1} COMPLETE</small><h2>${data[world].enemy} 已被击败</h2><div class="scoreBig">${score}</div><p>正确率：${accuracy}%｜客观题：${correct}/${questions.length}｜Struktur：4/4｜Esei：8/8</p><div class="toolbar">${next}<button onclick="startGame(${world})">再次挑战</button><button class="secondary" onclick="location.reload()">返回主页</button></div></div><div class="card"><h2>错题订正簿</h2>${errors.length?errors.map((e,i)=>`<div class="reviewItem"><b>${i+1}. ${e.q}</b><br>你的答案：${e.chosen<0?'时间到':e.a[e.chosen]}<br>正确答案：${e.a[e.c]}<br>华语解释：${e.cn}<br>关键词：${e.kw}</div>`).join(''):'<p>本轮没有错题。</p>'}</div>`}if(profile.name){renderMap();$('map').classList.remove('hide')}sync();</script></body></html>
