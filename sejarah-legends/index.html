<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title><style>:root{--bg:#07111f;--panel:#10213a;--panel2:#132945;--line:#31547c;--gold:#f3c65d;--text:#eef4ff;--green:#2b936c;--red:#a43d50;--purple:#6b59bb}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#17345b,#07111f 48%);color:var(--text);min-height:100vh}.app{max-width:1120px;margin:auto;padding:16px}.card{background:rgba(16,33,58,.96);border:1px solid #29496f;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 14px 38px #0005}button,input{padding:13px 16px;border:0;border-radius:12px;font-weight:800}button{background:var(--gold);cursor:pointer;transition:.18s}button:hover{transform:translateY(-2px);filter:brightness(1.08)}button:disabled{opacity:.35;cursor:not-allowed;transform:none}input{background:#09192c;color:#fff;border:1px solid #31547c;width:100%;margin:8px 0}.top,.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.top{justify-content:space-between}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#0b1a2e;border:1px solid #31547c;border-radius:999px;padding:8px 12px;font-weight:700}.hide{display:none!important}.worlds,.characters,.essayGrid,.badgeGrid,.itemGrid,.routeGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.world,.character,.essayCard,.badge,.item,.route{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:17px}.world.open,.character.selected,.essayCard.selected,.item.active{border-color:var(--gold);box-shadow:0 0 20px #f3c65d33}.locked{opacity:.4}.avatar{font-size:52px;text-align:center}.arena{position:relative;min-height:230px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:end;overflow:hidden;background:linear-gradient(#1a3151,#0b1728);border-radius:18px;padding:25px}.fighter{text-align:center}.sprite{font-size:78px;display:block;filter:drop-shadow(0 10px 8px #0008)}.enemySprite{animation:float 2s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}.attack{animation:attack .45s}@keyframes attack{50%{transform:translateX(65px) scale(1.12)}}.hit{animation:hit .45s}@keyframes hit{25%{transform:translateX(-12px);filter:brightness(2)}50%{transform:translateX(12px)}}.bossCast{animation:cast .7s}@keyframes cast{50%{transform:scale(1.22);filter:drop-shadow(0 0 16px #ff416c)}}.taunt{position:absolute;top:12px;right:18px;background:#7a2f3e;padding:9px 13px;border-radius:14px;max-width:55%;font-weight:700}.bar{height:15px;background:#07111f;border-radius:20px;overflow:hidden;border:1px solid #29496f}.bar span{display:block;height:100%;background:linear-gradient(90deg,#e44d68,#ff8c62);transition:.45s}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer,.builderOption{text-align:left;background:#17304f;color:#fff;border:1px solid #3c638d}.answer.ok{background:var(--green)}.answer.bad{background:var(--red)}.feedback{line-height:1.65}.correctBox{border-left:5px solid var(--green)}.wrongBox{border-left:5px solid var(--red)}.secondary{background:#25496f;color:#fff}.hint{background:var(--purple);color:#fff}.danger{background:#7a2f3e;color:#fff}.progress{font-size:13px;color:#aecaee}.reviewItem{background:#0b1a2e;border:1px solid #29496f;border-radius:14px;padding:14px;margin:10px 0}.builderOption{display:block;width:100%;margin:8px 0}.builderSlot{min-height:50px;border:2px dashed #50759e;border-radius:12px;padding:12px;margin:9px 0}.scoreBig{font-size:52px;font-weight:900;color:var(--gold)}.timerLow{background:#7a2f3e!important}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #29496f;text-align:left;white-space:nowrap}.item button{width:100%}.route strong,.badge strong{color:var(--gold)}@media(max-width:680px){.answers{grid-template-columns:1fr}.arena{min-height:190px;padding:15px}.sprite{font-size:58px}.taunt{font-size:12px}.app{padding:9px}.card{padding:15px}}</style></head><body><main class="app"><section class="card top"><div><small>KSSM FORM 4 + FORM 5</small><h1 style="margin:.25rem 0">SEJARAH LEGENDS</h1><div class="progress">Battle RPG • 华语订正 • Paper 2 Builder</div></div><div class="stats"><span class="pill">玩家 <b id="playerTop">-</b></span><span class="pill">分数 <b id="scoreTop">0</b></span><span class="pill">Combo <b id="comboTop">0</b></span><span class="pill">Hints <b id="hintTop">3</b></span><span id="timerPill" class="pill">时间 <b id="timerTop">20</b>s</span></div></section><section id="home"><div class="card"><h2>学生档案</h2><input id="studentName" placeholder="输入学生名字"><h3>选择角色</h3><div class="characters" id="characters"></div><div class="toolbar"><button onclick="saveProfile()">保存并进入地图</button><button class="secondary" onclick="showSaved()">教师成绩面板</button></div></div><div id="map" class="card hide"><h2>世界地图</h2><div class="worlds" id="worlds"></div><div class="card"><h3>复习路线</h3><div id="revisionRoute" class="routeGrid"></div></div><div class="card"><h3>已获得徽章</h3><div id="badges" class="badgeGrid"></div></div></div><div id="saved" class="card hide"></div></section><section id="game" class="hide"><div class="card arena"><div id="taunt" class="taunt">历史不是背诵，是战斗。</div><div class="fighter"><span id="heroSprite" class="sprite">⚔️</span><b id="heroName">Hero</b></div><div class="fighter"><span id="enemySprite" class="sprite enemySprite">♜</span><b id="enemyName">Penjaga</b><div class="bar"><span id="hp" style="width:100%"></span></div><small id="hpText">HP 100 / 100</small></div></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div class="answers" id="answers"></div><h3>战斗道具</h3><div class="itemGrid"><div class="item"><b>护盾</b><p>抵挡一次 Boss 惩罚</p><button id="shieldBtn" onclick="useItem('shield')">使用</button></div><div class="item"><b>时间冻结</b><p>本题增加 10 秒</p><button id="freezeBtn" onclick="useItem('freeze')">使用</button></div><div class="item"><b>双倍攻击</b><p>下一题得分与伤害 ×2</p><button id="doubleBtn" onclick="useItem('double')">使用</button></div></div><div class="toolbar"><button id="hintBtn" class="hint" onclick="useHint()">神秘人 Hint</button></div><div id="feedback" class="card feedback hide"></div></div></section><section id="builder" class="hide"><div class="card"><small>PAPER 2 • STRUKTUR BUILDER</small><h2 id="builderTitle"></h2><p id="builderQuestion"></p><div id="slots"></div><div id="builderOptions"></div><div class="toolbar"><button onclick="checkBuilder()">检查答案</button></div><div id="builderFeedback" class="card hide"></div></div></section><section id="essay" class="hide"><div class="card"><small>PAPER 2 • ESEI BUILDER</small><h2 id="essayTitle"></h2><p id="essayQuestion"></p><div id="essaySlots"></div><div id="essayOptions" class="essayGrid"></div><div class="toolbar"><button onclick="checkEssay()">形成 SPM Esei</button></div><div id="essayFeedback" class="card hide"></div></div></section><section id="result" class="hide"></section></main><script>const worldNames=['Warisan Negara Bangsa','Kebangkitan Nasionalisme','Konflik Dunia','Era Peralihan Kuasa British','Persekutuan Tanah Melayu 1948','Ancaman Komunis dan Darurat','Usaha ke Arah Kemerdekaan','Pilihan Raya','Perlembagaan PTM 1957','Pemasyhuran Kemerdekaan','Kedaulatan Negara','Perlembagaan Persekutuan','Raja Berperlembagaan','Sistem Persekutuan','Pembentukan Malaysia','Cabaran Selepas Pembentukan Malaysia','Membina Kesejahteraan Negara','Membina Kemakmuran Negara','Dasar Luar Malaysia'];const chars=[{n:'Pahlawan Keris',s:'⚔️',power:'答对攻击强化'},{n:'Puteri Arkib',s:'📜',power:'擅长关键词'},{n:'Penjelajah Masa',s:'⏳',power:'擅长时间线'}];let profile=JSON.parse(localStorage.getItem('sejarahProfile')||'null')||{name:'',char:0,unlocked:1,badges:[]};profile.badges=profile.badges||[];let selectedChar=profile.char||0;characters.innerHTML=chars.map((c,i)=>`<button class="character ${i===selectedChar?'selected':''}" onclick="selectChar(${i})"><div class="avatar">${c.s}</div><h3>${c.n}</h3><p>${c.power}</p></button>`).join('');studentName.value=profile.name||'';function selectChar(i){selectedChar=i;document.querySelectorAll('.character').forEach((e,n)=>e.classList.toggle('selected',n===i))}function saveProfile(){profile={...profile,name:studentName.value.trim()||'Pelajar',char:selectedChar,unlocked:profile.unlocked||1,badges:profile.badges||[]};localStorage.setItem('sejarahProfile',JSON.stringify(profile));playerTop.textContent=profile.name;renderMap();map.classList.remove('hide');saved.classList.add('hide')}function renderMap(){const best=JSON.parse(localStorage.getItem('sejarahBest')||'{}');worlds.innerHTML=worldNames.map((w,i)=>{const open=i<profile.unlocked,b=best[i+1];return `<div class="world ${open?'open':'locked'}"><small>WORLD ${i+1}</small><h3>${w}</h3><p>${open?(i<5?'已开放':'即将制作'):'完成前一世界后解锁'}</p>${b?`<p>最佳：${b.score} 分｜${b.accuracy}%</p>`:''}${i<5&&open?`<button onclick="startGame(${i})">进入 World ${i+1}</button>`:''}</div>`}).join('');badges.innerHTML=profile.badges.length?profile.badges.map(x=>`<div class="badge"><strong>${x}</strong></div>`).join(''):'<p>完成 World 后获得徽章。</p>';renderRevision()}function renderRevision(){const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]'),latest={};h.forEach(x=>latest[x.world]=x);const entries=Object.values(latest);revisionRoute.innerHTML=entries.length?entries.sort((a,b)=>a.accuracy-b.accuracy).map(x=>`<div class="route"><strong>World ${x.world}</strong><p>正确率 ${x.accuracy}%</p><p>${x.accuracy<70?'优先重做：基础事实与关键词':x.accuracy<90?'加强：Struktur 与时间线':'保持：挑战 Esei 与速度'}</p><button onclick="startGame(${x.world-1})">开始复习</button></div>`).join(''):'<p>完成首个 World 后自动生成复习路线。</p>'}function showSaved(){map.classList.add('hide');saved.classList.remove('hide');const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');saved.innerHTML=`<h2>教师成绩面板</h2><div class="toolbar"><button onclick="downloadCSV()">下载 CSV</button><button class="secondary" onclick="clearHistory()">清除记录</button></div>${history.length?`<div class="tableWrap"><table><thead><tr><th>学生</th><th>World</th><th>分数</th><th>正确率</th><th>错题</th><th>用时</th><th>日期</th></tr></thead><tbody>${history.slice().reverse().map(x=>`<tr><td>${x.name}</td><td>${x.world}</td><td>${x.score}</td><td>${x.accuracy}%</td><td>${x.errors}</td><td>${x.seconds||'-'}s</td><td>${x.date}</td></tr>`).join('')}</tbody></table></div>`:'<p>尚无完成记录。</p>'}`}function downloadCSV(){const h=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');if(!h.length)return alert('没有成绩记录');const rows=[['Student','World','Score','Accuracy','Errors','Seconds','Date'],...h.map(x=>[x.name,x.world,x.score,x.accuracy,x.errors,x.seconds||'',x.date])],csv='\ufeff'+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sejarah-legends-results.csv';a.click()}function clearHistory(){if(confirm('确定清除所有学生成绩？')){localStorage.removeItem('sejarahHistory');localStorage.removeItem('sejarahBest');showSaved()}}const data=[{enemy:'Penjaga Warisan',icon:'♜',qs:[['Apakah ciri negara bangsa yang berkaitan dengan kawasan pemerintahan?',['Rakyat','Wilayah pengaruh','Lambang kebesaran','Undang-undang'],1,'Wilayah pengaruh 是君主统治并获得承认的范围。','kawasan pemerintahan → wilayah pengaruh'],['Siapakah ketua pentadbir dan ketua tentera Kesultanan Melayu Melaka?',['Bendahara','Temenggung','Laksamana','Syahbandar'],0,'Bendahara 协助苏丹行政并统领军队。','ketua pentadbir + tentera → Bendahara'],['Apakah fungsi undang-undang?',['Menjamin keamanan','Menentukan warna bendera','Menghapuskan rakyat','Menggantikan pemerintah'],0,'法律维持秩序、安全与人民福祉。','undang-undang → keamanan'],['Apakah lambang kedaulatan Sultan Melaka?',['Cap mohor','Sawah padi','Pelabuhan','Pasar'],0,'Cap mohor 是苏丹权力象征。','kedaulatan → cap mohor']],bq:'Jelaskan dua ciri negara bangsa Kesultanan Melayu Melaka. [4 markah]',ba:['Melaka mempunyai wilayah pengaruh yang luas dan diakui kawasan lain.','Rakyat memberikan taat setia kepada sultan sebagai pemerintah.'],eq:'Huraikan kepentingan sistem pentadbiran yang tersusun. [8 markah]',ea:['Pentadbiran menjadi lebih teratur kerana tugas pembesar dibahagikan dengan jelas.','Keamanan negara dipelihara apabila undang-undang dilaksanakan.','Perdagangan berkembang kerana pelabuhan diurus sistematik.','Kesannya, Melaka muncul sebagai kerajaan yang kuat.']},{enemy:'Raksasa Penjajah',icon:'👹',qs:[['Apakah maksud nasionalisme?',['Perasaan cinta akan bangsa dan negara','Perdagangan bebas','Kuasa mutlak asing','Sistem cukai'],0,'民族主义是热爱民族与国家并争取自由。','nasionalisme → cinta bangsa dan negara'],['Revolusi Keagungan berlaku di...',['England','Perancis','China','India'],0,'Glorious Revolution 发生在 England。','Revolusi Keagungan → England'],['Tokoh nasionalisme Filipina ialah...',['Jose Rizal','Sun Yat Sen','Mahatma Gandhi','Soekarno'],0,'Jose Rizal 唤醒菲律宾民族意识。','Filipina → Jose Rizal'],['Gerakan Islah menekankan...',['pemulihan Islam dan kemajuan','penjajahan','hiburan','kuasa asing'],0,'Islah 主张改革思想与社会进步。','Islah → pembaharuan + kemajuan']],bq:'Jelaskan dua faktor kemunculan nasionalisme. [4 markah]',ba:['Media cetak menyebarkan idea pembaharuan dan perjuangan.','Sistem pendidikan melahirkan golongan intelektual.'],eq:'Huraikan kepentingan semangat nasionalisme. [8 markah]',ea:['Nasionalisme menyatukan rakyat mempertahankan tanah air.','Semangat ini mendorong rakyat menolak penjajahan.','Rakyat sanggup berkorban demi negara.','Kesannya, kedaulatan negara dipelihara.']},{enemy:'Panglima Dunia',icon:'🛡️',qs:[['Apakah faktor tercetusnya Perang Dunia Pertama?',['Persaingan kuasa imperialis','Kemajuan pendidikan','Perdagangan tempatan','Pilihan raya'],0,'列强争夺殖民地与军备竞赛引发战争。','Perang Dunia Pertama → persaingan imperialis'],['Kuasa Tengah diketuai oleh...',['Jerman','Britain','Perancis','Amerika Syarikat'],0,'Kuasa Tengah 主要由德国领导。','Kuasa Tengah → Jerman'],['Perang Dunia Kedua di Eropah bermula apabila Jerman menyerang...',['Poland','China','India','Mesir'],0,'1939年德国入侵波兰。','1939 → Jerman serang Poland'],['Tujuan Jepun menguasai Asia Tenggara ialah...',['Mendapatkan bahan mentah','Membina sekolah','Menghapus perdagangan','Mengadakan pilihan raya'],0,'日本需要原料支持战争工业。','Jepun → bahan mentah']],bq:'Jelaskan dua kesan pendudukan Jepun. [4 markah]',ba:['Rakyat mengalami kekurangan makanan dan inflasi.','Kesedaran politik serta semangat menentang penjajahan meningkat.'],eq:'Huraikan iktibar daripada konflik dunia. [8 markah]',ea:['Negara perlu mengutamakan rundingan.','Hubungan diplomatik dapat mengelakkan permusuhan.','Rakyat mesti bersatu mempertahankan keamanan.','Kesannya, kemusnahan dapat dielakkan.']},{enemy:'Maharaja Malayan Union',icon:'👑',qs:[['Malayan Union diperkenalkan pada tahun...',['1946','1948','1957','1963'],0,'Malayan Union 于1946年实施。','Malayan Union → 1946'],['Siapakah Gabenor pertama Malayan Union?',['Sir Edward Gent','Harold MacMichael','Henry Gurney','Frank Swettenham'],0,'Sir Edward Gent 是首任总督。','Gabenor pertama → Sir Edward Gent'],['Mengapakah orang Melayu menentang Malayan Union?',['Kuasa Raja Melayu terhakis','Cukai dihapuskan','Sekolah ditutup','Pilihan raya diadakan'],0,'马来统治者权力被削弱。','tentangan → kuasa Raja Melayu terhakis'],['Apakah pertubuhan yang mengetuai penentangan?',['UMNO','MCA','MIC','PKM'],0,'UMNO 领导反对行动。','penentangan Malayan Union → UMNO']],bq:'Jelaskan dua sebab penentangan terhadap Malayan Union. [4 markah]',ba:['Kuasa Raja-raja Melayu terhakis dalam pentadbiran.','Syarat kewarganegaraan jus soli dianggap terlalu longgar.'],eq:'Huraikan kepentingan penentangan terhadap Malayan Union. [8 markah]',ea:['Penentangan menyatukan orang Melayu.','Kedudukan Raja-raja Melayu dipertahankan.','British terdorong menggantikan Malayan Union.','Kesannya, PTM 1948 dibentuk.']},{enemy:'Penjaga Persekutuan',icon:'🏰',boss:'Kabut Fakta',qs:[['Persekutuan Tanah Melayu ditubuhkan pada...',['1 Februari 1948','31 Ogos 1957','16 September 1963','1 April 1946'],0,'PTM 1948 于1948年2月1日成立。','PTM → 1 Februari 1948'],['PTM 1948 menggantikan...',['Malayan Union','Kesatuan Melayu Muda','Persekutuan Malaysia','Majlis Raja-Raja'],0,'PTM 1948 取代 Malayan Union。','PTM 1948 → ganti Malayan Union'],['Siapakah yang terlibat dalam Jawatankuasa Kerja?',['Wakil Raja-raja Melayu, UMNO dan British','PKM sahaja','Pedagang asing sahaja','Tentera Jepun'],0,'工作委员会包括王室、UMNO与英国代表。','Jawatankuasa Kerja → Raja Melayu + UMNO + British'],['Apakah kesan PTM 1948 terhadap Raja Melayu?',['Kedudukan dipulihkan','Kuasa dihapuskan','Dibuang negeri','Tiada perubahan'],0,'PTM 1948 恢复马来统治者地位。','PTM 1948 → kedudukan Raja Melayu dipulihkan'],['Syarat kewarganegaraan PTM 1948 menjadi...',['lebih ketat','lebih longgar','dimansuhkan','terbuka tanpa syarat'],0,'公民条件较 Malayan Union 更严格。','kewarganegaraan → lebih ketat']],bq:'Jelaskan dua ciri Persekutuan Tanah Melayu 1948. [4 markah]',ba:['Gabungan sembilan negeri Melayu dengan Melaka dan Pulau Pinang.','Kedudukan Raja-raja Melayu dipulihkan dalam pentadbiran.'],eq:'Huraikan kepentingan pembentukan PTM 1948. [8 markah]',ea:['PTM 1948 menggantikan Malayan Union yang ditentang rakyat.','Kedudukan Raja-raja Melayu dipulihkan.','Syarat kewarganegaraan diperketat bagi menjaga kepentingan penduduk tempatan.','Kesannya, kerjasama menuju kemerdekaan dapat diperkukuh.']}];data.forEach(d=>d.qs=d.qs.map(x=>({q:x[0],a:x[1],c:x[2],cn:x[3],kw:x[4]})));let world=0,qs=[],index=0,hp=100,score=0,combo=0,hints=3,locked=false,errors=[],selected=[],essaySelected=[],secondsUsed=0,timeLeft=20,timer=null,items={shield:1,freeze:1,double:1},activeDouble=false,shieldActive=false;function setView(id){['home','game','builder','essay','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide')}function sync(){scoreTop.textContent=score;comboTop.textContent=combo;hintTop.textContent=hints;playerTop.textContent=profile.name||'-';hintBtn.disabled=hints<=0;timerTop.textContent=timeLeft;timerPill.classList.toggle('timerLow',timeLeft<=5);shieldBtn.disabled=!items.shield;freezeBtn.disabled=!items.freeze;doubleBtn.disabled=!items.double}function startTimer(){clearInterval(timer);timeLeft=20;sync();timer=setInterval(()=>{timeLeft--;secondsUsed++;sync();if(timeLeft<=0){clearInterval(timer);timeOut()}},1000)}function useItem(type){if(locked||!items[type])return;items[type]--;if(type==='shield'){shieldActive=true;feedback.className='card feedback';feedback.innerHTML='<b>护盾已启动：</b> 下一次答错不会触发 Boss 惩罚。'}if(type==='freeze'){timeLeft+=10;feedback.className='card feedback';feedback.innerHTML='<b>时间冻结：</b> 本题增加 10 秒。'}if(type==='double'){activeDouble=true;feedback.className='card feedback';feedback.innerHTML='<b>双倍攻击：</b> 下一题答对将获得双倍分数与伤害。'}feedback.classList.remove('hide');sync()}function bossSkill(){if(world<4||Math.random()>.45)return;enemySprite.classList.add('bossCast');setTimeout(()=>enemySprite.classList.remove('bossCast'),700);if(shieldActive){shieldActive=false;taunt.textContent='你的护盾挡住了「Kabut Fakta」！';return}timeLeft=Math.max(5,timeLeft-5);taunt.textContent='Boss 发动「Kabut Fakta」：时间减少 5 秒！';sync()}function timeOut(){if(locked)return;locked=true;const x=qs[index];combo=0;errors.push({...x,chosen:-1});document.querySelectorAll('.answer')[x.c].classList.add('ok');feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>时间到，需要订正</b><br><b>正确答案：</b>${x.a[x.c]}<br><b>华语解释：</b>${x.cn}<br><b>关键词：</b>${x.kw}`;feedback.classList.remove('hide');index++;setTimeout(()=>index>=qs.length?startBuilder():render(),1800)}function startGame(w){world=w;qs=data[w].qs;index=0;hp=100;score=0;combo=0;hints=3;errors=[];secondsUsed=0;items={shield:1,freeze:1,double:1};activeDouble=false;shieldActive=false;heroSprite.textContent=chars[profile.char].s;heroName.textContent=profile.name;enemySprite.textContent=data[w].icon;enemyName.textContent=data[w].enemy;setView('game');sync();render()}function render(){locked=false;const x=qs[index];meta.textContent=`WORLD ${world+1} • SOALAN ${index+1}/${qs.length}`;question.textContent=x.q;answers.innerHTML=x.a.map((v,n)=>`<button class="answer" data-n="${n}" onclick="pick(${n},this)">${String.fromCharCode(65+n)}. ${v}</button>`).join('');feedback.className='card feedback hide';taunt.textContent=data[world].boss&&index===0?`Boss 技能：${data[world].boss}`:combo>=3?'不错，但下一题会更狠。':'历史不是背诵，是战斗。';startTimer();setTimeout(bossSkill,500)}function pick(n,b){if(locked)return;locked=true;clearInterval(timer);const x=qs[index];document.querySelectorAll('.answer')[x.c].classList.add('ok');if(n===x.c){combo++;let gain=100+(combo-1)*20+timeLeft*5,damage=Math.ceil(100/qs.length);if(activeDouble){gain*=2;damage*=2;activeDouble=false}score+=gain;hp=Math.max(0,hp-damage);heroSprite.classList.add('attack');enemySprite.classList.add('hit');feedback.className='card feedback correctBox';feedback.innerHTML=`<b>正确！+${gain} 分</b><br>Combo × ${combo}<br><b>关键词：</b>${x.kw}`}else{combo=0;b.classList.add('bad');errors.push({...x,chosen:n});feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>需要订正</b><br><b>华语解释：</b>${x.cn}<br><b>正确答案：</b>${x.a[x.c]}<br><b>关键词：</b>${x.kw}`}feedback.classList.remove('hide');hp.style.width=hp+'%';hpText.textContent=`HP ${hp} / 100`;sync();setTimeout(()=>{heroSprite.classList.remove('attack');enemySprite.classList.remove('hit')},500);index++;setTimeout(()=>index>=qs.length?startBuilder():render(),1800)}function useHint(){if(locked||hints<=0)return;hints--;const x=qs[index];[0,1,2,3].filter(n=>n!==x.c).sort(()=>Math.random()-.5).slice(0,2).forEach(n=>document.querySelector(`[data-n="${n}"]`).disabled=true);feedback.className='card feedback';feedback.innerHTML='<b>神秘人泪光闪闪地出现：</b> 已排除两个错误答案。';feedback.classList.remove('hide');sync()}function startBuilder(){clearInterval(timer);setView('builder');selected=[];builderTitle.textContent=`World ${world+1} Struktur Challenge`;builderQuestion.textContent=data[world].bq;renderBuilder()}function renderBuilder(){slots.innerHTML=[0,1].map(i=>`<div class="builderSlot">${selected[i]||`Isi ${i+1}：点击下方答案`}</div>`).join('');const wrong=['Jawapan ini tidak berkaitan dengan kehendak soalan.','Fakta ini bercanggah dengan kandungan bab.'];builderOptions.innerHTML=[...data[world].ba,...wrong].map(v=>`<button class="builderOption" onclick='chooseBuilder(${JSON.stringify(v)})'>${v}</button>`).join('')}function chooseBuilder(v){if(!selected.includes(v)&&selected.length<2){selected.push(v);renderBuilder()}}function checkBuilder(){const ok=data[world].ba.every(v=>selected.includes(v));builderFeedback.classList.remove('hide');if(ok){score+=400;builderFeedback.className='card correctBox';builderFeedback.innerHTML='<b>Struktur：4/4 分</b><br>两个完整 isi + huraian。';setTimeout(startEssay,900)}else{builderFeedback.className='card wrongBox';builderFeedback.innerHTML='<b>答案不完整。</b><br>重新选择两个符合课本内容的完整句子。';selected=[];renderBuilder()}sync()}function startEssay(){setView('essay');essaySelected=[];essayTitle.textContent=`World ${world+1} Esei Challenge`;essayQuestion.textContent=data[world].eq;renderEssay()}function renderEssay(){essaySlots.innerHTML=['Isi 1','Huraian 1','Isi 2','Penegasan'].map((x,i)=>`<div class="builderSlot"><b>${x}</b><br>${essaySelected[i]||'尚未选择'}</div>`).join('');const wrong=['Fakta ini tidak menjawab kehendak soalan.','Jawapan terlalu umum dan tidak berkaitan.'];essayOptions.innerHTML=[...data[world].ea,...wrong].sort(()=>Math.random()-.5).map(v=>`<button class="essayCard ${essaySelected.includes(v)?'selected':''}" onclick='chooseEssay(${JSON.stringify(v)})'>${v}</button>`).join('')}function chooseEssay(v){if(!essaySelected.includes(v)&&essaySelected.length<4){essaySelected.push(v);renderEssay()}}function checkEssay(){const ok=data[world].ea.every(v=>essaySelected.includes(v));essayFeedback.classList.remove('hide');if(ok){score+=800;essayFeedback.className='card correctBox';essayFeedback.innerHTML=`<b>Esei：8/8 分</b><br><br>${data[world].ea.join(' ')}`;setTimeout(showResult,1200)}else{essayFeedback.className='card wrongBox';essayFeedback.innerHTML='<b>Esei belum lengkap.</b><br>选择四个与题目直接相关的句子。';essaySelected=[];renderEssay()}sync()}function showResult(){setView('result');const correct=qs.length-errors.length,accuracy=Math.round(correct/qs.length*100);if(profile.unlocked<world+2&&world<4){profile.unlocked=world+2}const badge=`World ${world+1} 征服者`;if(!profile.badges.includes(badge))profile.badges.push(badge);if(accuracy===100&&!profile.badges.includes('零错战神'))profile.badges.push('零错战神');localStorage.setItem('sejarahProfile',JSON.stringify(profile));const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');history.push({name:profile.name,world:world+1,score,accuracy,errors:errors.length,seconds:secondsUsed,date:new Date().toLocaleString()});localStorage.setItem('sejarahHistory',JSON.stringify(history.slice(-100)));const best=JSON.parse(localStorage.getItem('sejarahBest')||'{}');if(!best[world+1]||score>best[world+1].score)best[world+1]={score,accuracy};localStorage.setItem('sejarahBest',JSON.stringify(best));const next=world<4?`<button onclick="startGame(${world+1})">进入 World ${world+2}</button>`:'';result.innerHTML=`<div class="card"><small>WORLD ${world+1} COMPLETE</small><h2>${data[world].enemy} 已被击败</h2><div class="scoreBig">${score}</div><p>正确率：${accuracy}%　客观题：${correct}/${qs.length}　Struktur：4/4　Esei：8/8　用时：${secondsUsed}s</p><div class="toolbar">${next}<button onclick="startGame(${world})">再次挑战</button><button class="secondary" onclick="location.reload()">返回主页</button></div></div><div class="card"><h2>错题订正簿</h2>${errors.length?errors.map((e,i)=>`<div class="reviewItem"><b>${i+1}. ${e.q}</b><br>你的答案：${e.chosen<0?'时间到':e.a[e.chosen]}<br>正确答案：${e.a[e.c]}<br>华语解释：${e.cn}<br>马来文关键词：${e.kw}</div>`).join(''):'<p>本轮没有错题。</p>'}</div>`}if(profile.name){playerTop.textContent=profile.name;renderMap();map.classList.remove('hide')}sync();</script></body></html>
