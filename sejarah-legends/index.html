<!doctype html>
<html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title>
<style>
:root{--bg:#07111f;--panel:#10213a;--panel2:#132945;--line:#31547c;--gold:#f3c65d;--text:#eef4ff;--green:#2b936c;--red:#a43d50}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#17345b,#07111f 48%);color:var(--text);min-height:100vh}.app{max-width:1100px;margin:auto;padding:16px}.card{background:rgba(16,33,58,.96);border:1px solid #29496f;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 14px 38px #0005}button,input{padding:13px 16px;border:0;border-radius:12px;font-weight:800}button{background:var(--gold);cursor:pointer;transition:.18s}button:hover{transform:translateY(-2px);filter:brightness(1.08)}button:disabled{opacity:.35;cursor:not-allowed;transform:none}input{background:#09192c;color:#fff;border:1px solid #31547c;width:100%;margin:8px 0}.top,.toolbar,.battle{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.top{justify-content:space-between}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#0b1a2e;border:1px solid #31547c;border-radius:999px;padding:8px 12px;font-weight:700}.hide{display:none!important}.worlds,.characters{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.world,.character{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:17px}.world.open,.character.selected{border-color:var(--gold);box-shadow:0 0 20px #f3c65d33}.locked{opacity:.4}.avatar{font-size:52px;text-align:center}.arena{position:relative;min-height:230px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:end;overflow:hidden;background:linear-gradient(#1a3151,#0b1728);border-radius:18px;padding:25px}.fighter{text-align:center}.sprite{font-size:78px;display:block;filter:drop-shadow(0 10px 8px #0008)}.enemySprite{animation:float 2s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}.attack{animation:attack .45s}@keyframes attack{50%{transform:translateX(65px) scale(1.12)}}.hit{animation:hit .45s}@keyframes hit{25%{transform:translateX(-12px);filter:brightness(2)}50%{transform:translateX(12px)}}.taunt{position:absolute;top:12px;right:18px;background:#7a2f3e;padding:9px 13px;border-radius:14px;max-width:50%;font-weight:700}.bar{height:15px;background:#07111f;border-radius:20px;overflow:hidden;border:1px solid #29496f}.bar span{display:block;height:100%;background:linear-gradient(90deg,#e44d68,#ff8c62);transition:.45s}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer,.builderOption{text-align:left;background:#17304f;color:#fff;border:1px solid #3c638d}.answer.ok{background:var(--green)}.answer.bad{background:var(--red)}.feedback{line-height:1.65}.correctBox{border-left:5px solid var(--green)}.wrongBox{border-left:5px solid var(--red)}.secondary{background:#25496f;color:#fff}.hint{background:#6b59bb;color:#fff}.progress{font-size:13px;color:#aecaee}.reviewItem{background:#0b1a2e;border:1px solid #29496f;border-radius:14px;padding:14px;margin:10px 0}.builderOption{display:block;width:100%;margin:8px 0}.builderSlot{min-height:50px;border:2px dashed #50759e;border-radius:12px;padding:12px;margin:9px 0}.scoreBig{font-size:52px;font-weight:900;color:var(--gold)}@media(max-width:680px){.answers{grid-template-columns:1fr}.arena{min-height:190px;padding:15px}.sprite{font-size:58px}.taunt{font-size:12px}.app{padding:9px}.card{padding:15px}}
</style></head><body><main class="app">
<section class="card top"><div><small>KSSM FORM 4 + FORM 5</small><h1 style="margin:.25rem 0">SEJARAH LEGENDS</h1><div class="progress">Battle RPG • 华语订正 • Paper 2 Builder</div></div><div class="stats"><span class="pill">玩家 <b id="playerTop">-</b></span><span class="pill">分数 <b id="scoreTop">0</b></span><span class="pill">Combo <b id="comboTop">0</b></span><span class="pill">Hints <b id="hintTop">3</b></span></div></section>
<section id="home"><div class="card"><h2>建立学生档案</h2><input id="studentName" placeholder="输入学生名字"><h3>选择角色</h3><div class="characters" id="characters"></div><div class="toolbar"><button onclick="saveProfile()">保存并进入世界地图</button><button class="secondary" onclick="showSaved()">学生成绩</button></div></div><div id="map" class="card hide"><h2>世界地图</h2><div class="worlds" id="worlds"></div></div><div id="saved" class="card hide"></div></section>
<section id="game" class="hide"><div class="card arena"><div id="taunt" class="taunt">历史不是背诵，是战斗。</div><div class="fighter"><span id="heroSprite" class="sprite">⚔️</span><b id="heroName">Hero</b></div><div class="fighter"><span id="enemySprite" class="sprite enemySprite">♜</span><b id="enemyName">Penjaga</b><div class="bar"><span id="hp" style="width:100%"></span></div><small id="hpText">HP 100 / 100</small></div></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div class="answers" id="answers"></div><div class="toolbar"><button id="hintBtn" class="hint" onclick="useHint()">神秘人 Hint</button></div><div id="feedback" class="card feedback hide"></div></div></section>
<section id="builder" class="hide"><div class="card"><small>PAPER 2 • STRUKTUR BUILDER</small><h2 id="builderTitle"></h2><p id="builderQuestion"></p><div id="slots"></div><div id="builderOptions"></div><div class="toolbar"><button onclick="checkBuilder()">检查答案</button></div><div id="builderFeedback" class="card hide"></div></div></section><section id="result" class="hide"></section>
</main><script>
const worldNames=['Warisan Negara Bangsa','Kebangkitan Nasionalisme','Konflik Dunia','Era Peralihan Kuasa British','Persekutuan Tanah Melayu 1948','Ancaman Komunis dan Darurat','Usaha ke Arah Kemerdekaan','Pilihan Raya','Perlembagaan PTM 1957','Pemasyhuran Kemerdekaan','Kedaulatan Negara','Perlembagaan Persekutuan','Raja Berperlembagaan','Sistem Persekutuan','Pembentukan Malaysia','Cabaran Selepas Pembentukan Malaysia','Membina Kesejahteraan Negara','Membina Kemakmuran Negara','Dasar Luar Malaysia'];
const chars=[{n:'Pahlawan Keris',s:'⚔️',power:'答对攻击强化'},{n:'Puteri Arkib',s:'📜',power:'擅长关键词'},{n:'Penjelajah Masa',s:'⏳',power:'擅长时间线'}];let profile=JSON.parse(localStorage.getItem('sejarahProfile')||'null')||{name:'',char:0,unlocked:1};let selectedChar=profile.char||0;
characters.innerHTML=chars.map((c,i)=>`<button class="character ${i===selectedChar?'selected':''}" onclick="selectChar(${i})"><div class="avatar">${c.s}</div><h3>${c.n}</h3><p>${c.power}</p></button>`).join('');studentName.value=profile.name||'';
function selectChar(i){selectedChar=i;document.querySelectorAll('.character').forEach((e,n)=>e.classList.toggle('selected',n===i))}
function saveProfile(){profile={name:studentName.value.trim()||'Pelajar',char:selectedChar,unlocked:profile.unlocked||1};localStorage.setItem('sejarahProfile',JSON.stringify(profile));playerTop.textContent=profile.name;renderMap();map.classList.remove('hide')}
function renderMap(){worlds.innerHTML=worldNames.map((w,i)=>{const open=i<profile.unlocked;return `<div class="world ${open?'open':'locked'}"><small>WORLD ${i+1}</small><h3>${w}</h3><p>${open?(i<2?'已开放':'即将制作'):'完成前一世界后解锁'}</p>${i<2&&open?`<button onclick="startGame(${i})">进入 World ${i+1}</button>`:''}</div>`}).join('')}
function showSaved(){map.classList.add('hide');saved.classList.remove('hide');const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');saved.innerHTML=`<h2>学生成绩记录</h2>${history.length?history.slice().reverse().map(x=>`<div class="reviewItem"><b>${x.name} • World ${x.world}</b><br>分数：${x.score}　正确率：${x.accuracy}%　错题：${x.errors}<br>${x.date}</div>`).join(''):'<p>尚无完成记录。</p>'}`}
const data=[
{enemy:'Penjaga Warisan',icon:'♜',qs:[
{q:'Apakah ciri negara bangsa yang berkaitan dengan kawasan pemerintahan?',a:['Rakyat','Wilayah pengaruh','Lambang kebesaran','Undang-undang'],c:1,cn:'Wilayah pengaruh 是君主统治并获得承认的范围。',kw:'kawasan pemerintahan → wilayah pengaruh'},{q:'Siapakah ketua pentadbir dan ketua tentera Kesultanan Melayu Melaka?',a:['Bendahara','Temenggung','Laksamana','Syahbandar'],c:0,cn:'Bendahara 协助苏丹行政，并在战争时统领军队。',kw:'ketua pentadbir + tentera → Bendahara'},{q:'Apakah fungsi undang-undang?',a:['Menjamin keamanan','Menentukan warna bendera','Menghapuskan rakyat','Menggantikan pemerintah'],c:0,cn:'法律维持秩序、安全与人民福祉。',kw:'undang-undang → keamanan'},{q:'Siapakah rakyat Melaka?',a:['Pedagang asing sahaja','Penduduk yang taat kepada sultan','Pembesar sahaja','Tentera sahaja'],c:1,cn:'人民是居住在领土内并效忠苏丹的人。',kw:'rakyat → taat setia kepada sultan'},{q:'Apakah lambang kedaulatan Sultan Melaka?',a:['Cap mohor','Sawah padi','Pelabuhan','Pasar'],c:0,cn:'Cap mohor 是苏丹权力与官方命令的象征。',kw:'kedaulatan → cap mohor'},{q:'Hukum Kanun Melaka mengandungi...',a:['jenayah dan kekeluargaan','cuaca sahaja','permainan','bahasa asing'],c:0,cn:'法典包含刑事、家庭、统治与经济规则。',kw:'Hukum Kanun Melaka → jenayah + kekeluargaan'},{q:'Undang-Undang Laut Melaka mengatur...',a:['istana','pelayaran dan perdagangan','sawah','perkahwinan sahaja'],c:1,cn:'海事法规范船上职责、航海与贸易。',kw:'Undang-Undang Laut → pelayaran + perdagangan'},{q:'Apakah peranan Syahbandar?',a:['Mengurus pelabuhan','Ketua agama','Menjaga sawah','Mengarang hikayat'],c:0,cn:'Syahbandar 管理港口与商人事务。',kw:'Syahbandar → pelabuhan'},{q:'Mengapakah waadat penting?',a:['Kesetiaan dan tanggungjawab','Hapus undang-undang','Tutup pelabuhan','Kuasa pedagang'],c:0,cn:'Waadat 建立统治者与人民的责任关系。',kw:'waadat → kesetiaan + tanggungjawab'},{q:'Bukti pentadbiran Melaka tersusun ialah...',a:['Pembesar Empat Lipatan','Tiada tugas','Pedagang memerintah','Tiada undang-undang'],c:0,cn:'该制度清楚划分行政层级与职责。',kw:'pentadbiran → Pembesar Empat Lipatan'}],bq:'Jelaskan dua ciri negara bangsa Kesultanan Melayu Melaka. [4 markah]',ba:['Melaka mempunyai wilayah pengaruh yang luas dan diakui kawasan lain.','Rakyat memberikan taat setia kepada sultan sebagai pemerintah.']},
{enemy:'Raksasa Penjajah',icon:'👹',qs:[
{q:'Apakah maksud nasionalisme?',a:['Perasaan cinta akan bangsa dan negara','Perdagangan bebas','Kuasa mutlak asing','Sistem cukai'],c:0,cn:'民族主义指对民族与国家的热爱，并争取自由与主权。',kw:'nasionalisme → cinta bangsa dan negara'},{q:'Revolusi Keagungan berlaku di...',a:['England','Perancis','China','India'],c:0,cn:'Glorious Revolution 发生在 England。',kw:'Revolusi Keagungan → England'},{q:'Revolusi Amerika menentang...',a:['penjajahan British','Jepun','Belanda','Rusia'],c:0,cn:'美国殖民地反抗英国统治与不公平征税。',kw:'Revolusi Amerika → British'},{q:'Slogan Revolusi Perancis ialah...',a:['Liberty, Equality, Fraternity','Asia untuk Asia','Merdeka atau mati','Hidup perdagangan'],c:0,cn:'法国革命核心口号是自由、平等、博爱。',kw:'Perancis → kebebasan + persamaan + persaudaraan'},{q:'Tokoh nasionalisme Filipina ialah...',a:['Jose Rizal','Sun Yat Sen','Mahatma Gandhi','Soekarno'],c:0,cn:'Jose Rizal 通过写作唤醒菲律宾民族意识。',kw:'Filipina → Jose Rizal'},{q:'Tokoh nasionalisme India yang terkenal dengan satyagraha ialah...',a:['Mahatma Gandhi','Ho Chi Minh','Jose Rizal','Raja Chulan'],c:0,cn:'Gandhi 以非暴力不合作运动反抗英国。',kw:'India → Mahatma Gandhi → satyagraha'},{q:'Gerakan Islah menekankan...',a:['pemulihan Islam dan kemajuan','penjajahan','hiburan','kuasa asing'],c:0,cn:'Gerakan Islah 主张改革思想、教育与社会进步。',kw:'Islah → pembaharuan + kemajuan'},{q:'Akhbar digunakan oleh nasionalis untuk...',a:['menyebarkan idea perjuangan','menutup sekolah','menghapus bahasa','membantu penjajah'],c:0,cn:'报章是传播改革与民族主义思想的重要媒介。',kw:'akhbar → sebar idea nasionalisme'}],bq:'Jelaskan dua faktor kemunculan nasionalisme di negara kita. [4 markah]',ba:['Peranan media cetak menyebarkan idea pembaharuan dan perjuangan.','Sistem pendidikan melahirkan golongan intelektual yang sedar tentang nasib bangsa.']}
];
let world=0,qs=[],index=0,hp=100,score=0,combo=0,hints=3,locked=false,errors=[],selected=[];
function setView(id){['home','game','builder','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide')}
function sync(){scoreTop.textContent=score;comboTop.textContent=combo;hintTop.textContent=hints;playerTop.textContent=profile.name||'-';hintBtn.disabled=hints<=0}
function startGame(w){world=w;qs=data[w].qs;index=0;hp=100;score=0;combo=0;hints=3;errors=[];heroSprite.textContent=chars[profile.char].s;heroName.textContent=profile.name;enemySprite.textContent=data[w].icon;enemyName.textContent=data[w].enemy;setView('game');sync();render()}
function render(){locked=false;const x=qs[index];meta.textContent=`WORLD ${world+1} • SOALAN ${index+1}/${qs.length}`;question.textContent=x.q;answers.innerHTML=x.a.map((v,n)=>`<button class="answer" data-n="${n}" onclick="pick(${n},this)">${String.fromCharCode(65+n)}. ${v}</button>`).join('');feedback.className='card feedback hide';taunt.textContent=combo>=3?'不错，但下一题会让你掉分。':index>qs.length/2?'你的分数追得上我吗？':'历史不是背诵，是战斗。';sync()}
function pick(n,b){if(locked)return;locked=true;const x=qs[index];document.querySelectorAll('.answer')[x.c].classList.add('ok');if(n===x.c){combo++;const gain=100+(combo-1)*20;score+=gain;hp=Math.max(0,hp-Math.ceil(100/qs.length));heroSprite.classList.add('attack');enemySprite.classList.add('hit');feedback.className='card feedback correctBox';feedback.innerHTML=`<b>正确！+${gain} 分</b><br>Combo × ${combo}<br><b>关键词：</b>${x.kw}`}else{combo=0;b.classList.add('bad');errors.push({...x,chosen:n});feedback.className='card feedback wrongBox';feedback.innerHTML=`<b>需要订正</b><br><b>华语解释：</b>${x.cn}<br><b>正确答案：</b>${x.a[x.c]}<br><b>马来文关键词：</b>${x.kw}<br><b>提醒：</b>先圈题目关键词，再判断答案。`}feedback.classList.remove('hide');hp.style.width=hp+'%';hpText.textContent=`HP ${hp} / 100`;sync();setTimeout(()=>{heroSprite.classList.remove('attack');enemySprite.classList.remove('hit')},500);index++;setTimeout(()=>index>=qs.length?startBuilder():render(),1900)}
function useHint(){if(locked||hints<=0)return;hints--;const x=qs[index];[0,1,2,3].filter(n=>n!==x.c).sort(()=>Math.random()-.5).slice(0,2).forEach(n=>document.querySelector(`[data-n="${n}"]`).disabled=true);feedback.className='card feedback';feedback.innerHTML='<b>神秘人泪光闪闪地出现：</b> 已排除两个错误答案。';feedback.classList.remove('hide');sync()}
function startBuilder(){setView('builder');selected=[];builderTitle.textContent=`World ${world+1} Struktur Challenge`;builderQuestion.textContent=data[world].bq;renderBuilder()}
function renderBuilder(){slots.innerHTML=[0,1].map(i=>`<div class="builderSlot">${selected[i]||`Isi ${i+1}：点击下方答案`}</div>`).join('');const wrong=world===0?['Melaka tidak mempunyai undang-undang.','Pedagang asing menjadi pemerintah Melaka.']:['Media cetak menghalang penyebaran idea.','Pendidikan menghapuskan kesedaran bangsa.'];builderOptions.innerHTML=[...data[world].ba,...wrong].map(v=>`<button class="builderOption" onclick='chooseBuilder(${JSON.stringify(v)})'>${v}</button>`).join('')}
function chooseBuilder(v){if(!selected.includes(v)&&selected.length<2){selected.push(v);renderBuilder()}}
function checkBuilder(){const ok=data[world].ba.every(v=>selected.includes(v));builderFeedback.classList.remove('hide');if(ok){score+=400;builderFeedback.className='card correctBox';builderFeedback.innerHTML='<b>Struktur：4/4 分</b><br>两个完整 isi + huraian。';setTimeout(showResult,1100)}else{builderFeedback.className='card wrongBox';builderFeedback.innerHTML='<b>答案不完整。</b><br>重新选择两个符合课本内容的完整句子。';selected=[];renderBuilder()}sync()}
function showResult(){setView('result');const correct=qs.length-errors.length,accuracy=Math.round(correct/qs.length*100);if(world===0&&profile.unlocked<2){profile.unlocked=2;localStorage.setItem('sejarahProfile',JSON.stringify(profile))}const history=JSON.parse(localStorage.getItem('sejarahHistory')||'[]');history.push({name:profile.name,world:world+1,score,accuracy,errors:errors.length,date:new Date().toLocaleString()});localStorage.setItem('sejarahHistory',JSON.stringify(history.slice(-30)));result.innerHTML=`<div class="card"><small>WORLD ${world+1} COMPLETE</small><h2>${data[world].enemy} 已被击败</h2><div class="scoreBig">${score}</div><p>正确率：${accuracy}%　客观题：${correct}/${qs.length}　Struktur：4/4</p><div class="toolbar">${world===0?'<button onclick="startGame(1)">进入已解锁 World 2</button>':''}<button onclick="startGame(${world})">再次挑战</button><button class="secondary" onclick="location.reload()">返回主页</button></div></div><div class="card"><h2>错题订正簿</h2>${errors.length?errors.map((e,i)=>`<div class="reviewItem"><b>${i+1}. ${e.q}</b><br>你的答案：${e.a[e.chosen]}<br>正确答案：${e.a[e.c]}<br>华语解释：${e.cn}<br>马来文关键词：${e.kw}</div>`).join(''):'<p>本轮没有错题。</p>'}</div>`}
if(profile.name){playerTop.textContent=profile.name;renderMap();map.classList.remove('hide')}sync();
</script></body></html>
