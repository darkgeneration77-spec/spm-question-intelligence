<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Legends SPM</title><link rel="stylesheet" href="styles.css"></head><body><main class="app"><section class="card top"><div><small>KSSM FORM 4 + FORM 5</small><h1>SEJARAH LEGENDS</h1><div>Battle RPG • 华语订正 • Paper 2 Builder</div></div><div class="stats"><span class="pill">玩家 <b id="playerTop">-</b></span><span class="pill">分数 <b id="scoreTop">0</b></span><span class="pill">Combo <b id="comboTop">0</b></span><span class="pill">Hints <b id="hintTop">3</b></span><span id="timerPill" class="pill">时间 <b id="timerTop">20</b>s</span></div></section><section id="home"><div class="card"><h2>学生档案</h2><input id="studentName" placeholder="输入学生名字"><h3>选择角色</h3><div id="characters" class="characters"></div><div class="toolbar"><button onclick="saveProfile()">保存并进入地图</button><button class="secondary" onclick="showSaved()">教师成绩面板</button></div></div><div id="map" class="card hide"><h2>世界地图</h2><div id="worlds" class="worlds"></div><div class="card"><h3>复习路线</h3><div id="revisionRoute" class="routeGrid"></div></div><div class="card"><h3>已获得徽章</h3><div id="badges" class="badgeGrid"></div></div></div><div id="saved" class="card hide"></div></section><section id="game" class="hide"><div class="card arena"><div id="taunt" class="taunt">历史不是背诵，是战斗。</div><div class="fighter"><span id="heroSprite" class="sprite">⚔️</span><b id="heroName">Hero</b></div><div class="fighter"><span id="enemySprite" class="sprite enemySprite">♜</span><b id="enemyName">Penjaga</b><div class="bar"><span id="hpBar" style="width:100%"></span></div><small id="hpText">HP 100 / 100</small></div></div><div class="card"><small id="meta"></small><h2 id="question"></h2><div id="answers" class="answers"></div><div class="toolbar"><button id="hintBtn" class="hint" onclick="useHint()">神秘人 Hint</button><button id="nextBtn" class="secondary hide" onclick="nextQuestion()">下一题</button></div><div id="feedback" class="card hide"></div></div></section><section id="builder" class="hide"><div class="card"><small>PAPER 2 • STRUKTUR BUILDER</small><h2 id="builderTitle"></h2><p id="builderQuestion"></p><div id="slots"></div><div id="builderOptions"></div><button onclick="checkBuilder()">检查答案</button><div id="builderFeedback" class="card hide"></div></div></section><section id="essay" class="hide"><div class="card"><small>PAPER 2 • ESEI BUILDER</small><h2 id="essayTitle"></h2><p id="essayQuestion"></p><div id="essaySlots"></div><div id="essayOptions" class="essayGrid"></div><button onclick="checkEssay()">形成 SPM Esei</button><div id="essayFeedback" class="card hide"></div></div></section><section id="result" class="hide"></section></main><script src="data.js"></script><script src="world-13.js"></script><script src="world-14.js"></script><script src="app.js"></script></body></html>
